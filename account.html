<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Account — GameZone</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .account-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 16px 80px;
    }

    /* ── Avatar + header ── */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
    }
    .profile-info h1 {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .profile-info p {
      font-size: 14px;
      color: #7070a0;
    }
    .member-badge {
      margin-left: auto;
      background: rgba(124,58,237,0.2);
      border: 1px solid #4c2a8a;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #a78bfa;
    }

    /* ── Stat cards grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 14px;
      padding: 20px 18px;
      text-align: center;
    }
    .stat-icon { font-size: 28px; margin-bottom: 8px; }
    .stat-value {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
      line-height: 1;
    }
    .stat-label { font-size: 12px; color: #5050a0; text-transform: uppercase; letter-spacing: 0.07em; }

    .stat-card.highlight {
      border-color: #4c2a8a;
      background: linear-gradient(135deg, #1a1535 0%, #1a1a2e 100%);
    }
    .stat-card.highlight .stat-value { color: #a78bfa; }

    /* ── Section titles ── */
    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #5050a0;
      font-weight: 600;
      margin: 0 0 14px;
    }

    /* ── Score rows ── */
    .scores-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .score-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #1e1e3a;
      gap: 12px;
    }
    .score-row:last-child { border-bottom: none; }
    .score-game {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      color: #d0d0e0;
      font-weight: 500;
    }
    .score-game span { font-size: 20px; }
    .score-value {
      font-size: 16px;
      font-weight: 700;
      color: #a78bfa;
    }
    .score-none { font-size: 14px; color: #3a3a6a; font-style: italic; }

    /* ── Poker rank banner ── */
    .rank-banner {
      background: linear-gradient(135deg, #1e0845 0%, #1a1a2e 100%);
      border: 1px solid #4c2a8a;
      border-radius: 14px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .rank-left h3 { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .rank-left p  { font-size: 13px; color: #7070a0; }
    .rank-number {
      font-size: 42px;
      font-weight: 700;
      color: #a78bfa;
      line-height: 1;
    }
    .rank-number small { font-size: 16px; color: #5050a0; }

    /* ── Chip refill notice ── */
    .refill-notice {
      background: #14532d22;
      border: 1px solid #14532d;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #4ade80;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Action buttons ── */
    .actions-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn-poker {
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Segoe UI', sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn-poker:hover { background: #6d28d9; }
    .btn-outline {
      background: transparent;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      color: #9090b0;
      padding: 12px 22px;
      font-size: 15px;
      font-family: 'Segoe UI', sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn-outline:hover { background: #1a1a2e; color: #e0e0e0; }

    /* ── Loading / login states ── */
    .loading-state {
      text-align: center;
      padding: 80px 20px;
      color: #5050a0;
      font-size: 16px;
    }
    .login-prompt {
      text-align: center;
      padding: 80px 20px;
    }
    .login-prompt p { color: #7070a0; font-size: 16px; margin-bottom: 20px; }

    /* ── Skeleton loader ── */
    .skeleton {
      background: linear-gradient(90deg, #1a1a2e 25%, #22223a 50%, #1a1a2e 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 600px) {
      .profile-header { flex-direction: column; text-align: center; }
      .member-badge   { margin-left: 0; }
      .rank-banner    { flex-direction: column; text-align: center; }
      .actions-row    { flex-direction: column; }
      .btn-poker, .btn-outline { text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo" style="text-decoration:none;">🎮 GameZone</a>
    <ul class="nav-links">
      <li><a href="index.html#arcade">Arcade</a></li>
      <li><a href="index.html#puzzle">Puzzle</a></li>
      <li><a href="index.html#card">Card</a></li>
    </ul>
    <div class="nav-auth" id="navAuth">
      <a href="login.html" class="btn-secondary">Log in</a>
      <a href="signup.html" class="btn-primary">Sign up</a>
    </div>
  </nav>

  <div class="account-wrap">
    <div id="pageContent">
      <div class="loading-state">Loading your profile…</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut }
      from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, doc, getDoc, collection, query, orderBy, limit, getDocs }
      from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyDT810ckpGIr0ExRp3S_bAO_NBnSGr5ALY",
      authDomain:        "gamezone-6487a.firebaseapp.com",
      projectId:         "gamezone-6487a",
      storageBucket:     "gamezone-6487a.firebasestorage.app",
      messagingSenderId: "266519256159",
      appId:             "1:266519256159:web:34d6be085083cda5ff4fea"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // ── IMPORTANT: Replace with your Render.com URL after deploying poker server ──
    const SERVER_URL = 'https://gamezone-poker.onrender.com';

    const navAuth    = document.getElementById('navAuth');
    const pageContent = document.getElementById('pageContent');

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        showLoginPrompt();
        return;
      }

      // Update nav
      const displayName = user.displayName || user.email.split('@')[0];
      navAuth.innerHTML = `
        <span class="nav-username">👾 ${escHtml(displayName)}</span>
        <button class="btn-secondary" id="logoutBtn">Log out</button>
      `;
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await signOut(auth);
        window.location.href = 'index.html';
      });

      // Load all data in parallel
      pageContent.innerHTML = `<div class="loading-state">Loading your stats…</div>`;
      try {
        const [snakeScore, tetrisScore, solitaireScore, pokerData, pokerRank] = await Promise.all([
          getGameScore('snake',     user.uid),
          getGameScore('tetris',    user.uid),
          getGameScore('solitaire', user.uid),
          getPokerData(user.uid),
          getPokerRank(user.uid)
        ]);
        renderPage(user, displayName, { snakeScore, tetrisScore, solitaireScore, pokerData, pokerRank });
      } catch (err) {
        console.error('Failed to load profile:', err);
        pageContent.innerHTML = `<div class="loading-state" style="color:#f87171;">Failed to load profile. Please refresh.</div>`;
      }
    });

    // ── Data fetchers ──────────────────────────────────────────
    async function getGameScore(game, userId) {
      try {
        const snap = await getDoc(doc(db, 'games', game, 'scores', userId));
        return snap.exists() ? snap.data().score : null;
      } catch { return null; }
    }

    async function getPokerData(userId) {
      try {
        const snap = await getDoc(doc(db, 'poker_players', userId));
        return snap.exists() ? snap.data() : null;
      } catch { return null; }
    }

    async function getPokerRank(userId) {
      // Rank by wins (how many players have MORE wins than this user)
      try {
        const snap = await getDocs(
          query(collection(db, 'poker_players'), orderBy('wins', 'desc'))
        );
        let rank = 1;
        for (const d of snap.docs) {
          if (d.id === userId) return rank;
          rank++;
        }
        return rank; // not found → append at end
      } catch { return null; }
    }

    // ── Render ─────────────────────────────────────────────────
    function renderPage(user, displayName, data) {
      const { snakeScore, tetrisScore, solitaireScore, pokerData, pokerRank } = data;

      const chips       = pokerData?.chips       ?? 10000;
      const wins        = pokerData?.wins         ?? 0;
      const gamesPlayed = pokerData?.gamesPlayed  ?? 0;
      const isNewPlayer = !pokerData;

      // Check if chips were refilled today
      const today       = new Date().toDateString();
      const wasRefilled = pokerData?.lastRefillDate === today && chips === 10000 && wins === 0 && gamesPlayed === 0;

      // Initials for avatar
      const initials = displayName.slice(0, 1).toUpperCase();

      pageContent.innerHTML = `
        <!-- Profile header -->
        <div class="profile-header">
          <div class="avatar">${escHtml(initials)}</div>
          <div class="profile-info">
            <h1>${escHtml(displayName)}</h1>
            <p>${escHtml(user.email)}</p>
          </div>
          <div class="member-badge">⭐ GameZone Member</div>
        </div>

        ${chips < 1000 ? `
          <div class="refill-notice">
            🔄 Your chips are running low! Log in tomorrow to get a free refill back to 10,000.
          </div>` : ''}

        <!-- Stats grid -->
        <div class="section-title">Poker Stats</div>
        <div class="stats-grid">
          <div class="stat-card highlight">
            <div class="stat-icon">🪙</div>
            <div class="stat-value">${chips.toLocaleString()}</div>
            <div class="stat-label">Chips</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🏆</div>
            <div class="stat-value">${wins.toLocaleString()}</div>
            <div class="stat-label">Wins</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🃏</div>
            <div class="stat-value">${gamesPlayed.toLocaleString()}</div>
            <div class="stat-label">Games Played</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">📊</div>
            <div class="stat-value">${gamesPlayed > 0 ? Math.round((wins / gamesPlayed) * 100) + '%' : '—'}</div>
            <div class="stat-label">Win Rate</div>
          </div>
        </div>

        <!-- Leaderboard rank -->
        ${pokerRank ? `
          <div class="rank-banner">
            <div class="rank-left">
              <h3>♠️ Poker Leaderboard Rank</h3>
              <p>Based on total wins</p>
            </div>
            <div class="rank-number">#${pokerRank}<small> / wins</small></div>
          </div>` : ''}

        <!-- Game best scores -->
        <div class="section-title">Best Scores</div>
        <div class="scores-card">
          <div class="score-row">
            <div class="score-game"><span>🐍</span> Snake</div>
            ${snakeScore !== null
              ? `<div class="score-value">${Number(snakeScore).toLocaleString()} pts</div>`
              : `<div class="score-none">No score yet</div>`}
          </div>
          <div class="score-row">
            <div class="score-game"><span>🟦</span> Tetris</div>
            ${tetrisScore !== null
              ? `<div class="score-value">${Number(tetrisScore).toLocaleString()} pts</div>`
              : `<div class="score-none">No score yet</div>`}
          </div>
          <div class="score-row">
            <div class="score-game"><span>♠️</span> Solitaire</div>
            ${solitaireScore !== null
              ? `<div class="score-value">${formatTime(solitaireScore)}</div>`
              : `<div class="score-none">No score yet</div>`}
          </div>
        </div>

        <!-- Actions -->
        <div class="actions-row">
          <a href="games/poker/lobby.html" class="btn-poker">♠️ Play Poker</a>
          <a href="leaderboard.html" class="btn-outline">🏆 Leaderboard</a>
          <a href="index.html" class="btn-outline">← All Games</a>
        </div>
      `;
    }

    function showLoginPrompt() {
      navAuth.innerHTML = `
        <a href="login.html" class="btn-secondary">Log in</a>
        <a href="signup.html" class="btn-primary">Sign up</a>
      `;
      pageContent.innerHTML = `
        <div class="login-prompt">
          <p>Log in to view your GameZone profile and stats.</p>
          <a href="login.html" class="btn-poker">Log in</a>
        </div>
      `;
    }

    // ── Helpers ────────────────────────────────────────────────
    function formatTime(secs) {
      const m = Math.floor(secs / 60);
      const s = String(secs % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>

</body>
</html>
