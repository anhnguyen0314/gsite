<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — GameZone</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-page {
      min-height: calc(100vh - 70px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .auth-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }

    .auth-logo {
      text-align: center;
      font-size: 36px;
      margin-bottom: 8px;
    }

    .auth-card h1 {
      text-align: center;
      font-size: 24px;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .auth-card .subtitle {
      text-align: center;
      font-size: 14px;
      color: #7070a0;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #a0a0c0;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 15px;
      font-family: 'Segoe UI', sans-serif;
      transition: border-color 0.2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: #7c3aed;
    }

    .form-group input::placeholder {
      color: #404060;
    }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Segoe UI', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .btn-submit:hover {
      background: #6d28d9;
    }

    .btn-submit:disabled {
      background: #4a2a8a;
      cursor: not-allowed;
    }

    .error-msg {
      background: #2a1a1a;
      border: 1px solid #6b2020;
      color: #f87171;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .success-msg {
      background: #1a2a1a;
      border: 1px solid #206b20;
      color: #86efac;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #6060a0;
    }

    .auth-footer a {
      color: #a78bfa;
      text-decoration: none;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .divider {
      border: none;
      border-top: 1px solid #2a2a4a;
      margin: 28px 0;
    }

    .password-hint {
      font-size: 12px;
      color: #505070;
      margin-top: 5px;
    }

    .display-name-warning {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      background: #1e1a10;
      border: 1px solid #7c5a00;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 8px;
      font-size: 12px;
      color: #f5c542;
      line-height: 1.5;
    }

    .display-name-warning .warn-icon {
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 1px;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html" class="nav-logo" style="text-decoration:none;">🎮 GameZone</a>
    <div class="nav-auth">
      <a href="login.html" class="btn-secondary">Log in</a>
      <a href="signup.html" class="btn-primary">Sign up</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">🎮</div>
      <h1>Create your account</h1>
      <p class="subtitle">Join GameZone and track your scores</p>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <form id="signupForm">
        <div class="form-group">
          <label for="username">Display Name</label>
          <input type="text" id="username" placeholder="e.g. GamerPro99" maxlength="20" required />
          <div class="display-name-warning">
            <span class="warn-icon">⚠️</span>
            <span>This name will appear on leaderboards and in games. <strong>It cannot be changed after account creation.</strong> Choose carefully!</span>
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 6 characters" required />
          <p class="password-hint">Minimum 6 characters</p>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat your password" required />
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Create Account</button>
      </form>

      <hr class="divider" />
      <p class="auth-footer">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>

  <!-- Firebase SDK (v9 modular via CDN) -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    // ─── PASTE YOUR FIREBASE CONFIG HERE ───────────────────────────────────────
    // After creating your Firebase project, replace the values below with your
    // own config object from the Firebase Console.
    const firebaseConfig = {
      apiKey:            "AIzaSyDT810ckpGIr0ExRp3S_bAO_NBnSGr5ALY",
      authDomain:        "gamezone-6487a.firebaseapp.com",
      projectId:         "gamezone-6487a",
      storageBucket:     "gamezone-6487a.firebasestorage.app",
      messagingSenderId: "266519256159",
      appId:             "1:266519256159:web:34d6be085083cda5ff4fea"
    };
    // ───────────────────────────────────────────────────────────────────────────

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const form            = document.getElementById('signupForm');
    const submitBtn       = document.getElementById('submitBtn');
    const errorMsg        = document.getElementById('errorMsg');
    const successMsg      = document.getElementById('successMsg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      successMsg.style.display = 'none';
    }

    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.style.display = 'block';
      errorMsg.style.display = 'none';
    }

    function friendlyError(code) {
      const map = {
        'auth/email-already-in-use':    'That email is already registered. Try logging in instead.',
        'auth/invalid-email':           'Please enter a valid email address.',
        'auth/weak-password':           'Password must be at least 6 characters.',
        'auth/network-request-failed':  'Network error. Check your connection and try again.',
      };
      return map[code] || 'Something went wrong. Please try again.';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      const username        = document.getElementById('username').value.trim();
      const email           = document.getElementById('email').value.trim();
      const password        = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Client-side validation
      if (username.length < 2) {
        return showError('Display name must be at least 2 characters.');
      }
      if (password !== confirmPassword) {
        return showError('Passwords do not match.');
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account…';

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(userCredential.user, { displayName: username });

        showSuccess('Account created! Redirecting to GameZone…');
        setTimeout(() => { window.location.href = 'index.html'; }, 1500);
      } catch (err) {
        showError(friendlyError(err.code));
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });
  </script>

</body>
</html>
