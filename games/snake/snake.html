<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake · PlayDen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0c0d14;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0 20px 20px;
    }

    .header {
      width: calc(100% + 40px);
      margin-left: -20px;
      margin-right: -20px;
      background: #1a1b28;
      border-bottom: 1px solid #2a2a4a;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }

    .back-btn {
      background: none;
      border: 1px solid #2a2a4a;
      color: #a78bfa;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      text-decoration: none;
    }
    .back-btn:hover { background: #2a2a4a; }

    .header-title { font-size: 18px; font-weight: 700; color: #a78bfa; }

    .chip-display {
      background: #0c0d14;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      white-space: nowrap;
    }
    .chip-display span { font-weight: 700; color: #a78bfa; }

    .stats {
      display: flex;
      gap: 24px;
      margin-bottom: 16px;
    }

    .stat { text-align: center; }

    .stat-label {
      font-size: 11px;
      color: #9090b0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #a78bfa;
      transition: transform 0.25s, color 0.25s;
    }

    /* Canvas scales responsively — aspect ratio maintained by width/height attributes */
    .canvas-wrap {
      position: relative;
      width: 100%;
      max-width: 480px;
    }

    canvas {
      background: #1a1b28;
      border: 2px solid #2a2a4a;
      border-radius: 12px;
      display: block;
      width: 100%;
      height: auto;
      touch-action: none; /* prevent default scroll/zoom on canvas swipes */
    }

    .controls {
      margin-top: 12px;
    }

    .btn {
      background: #7c3aed;
      color: #fff;
      border: none;
      padding: 10px 32px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #6d28d9; }

    .status {
      font-size: 13px;
      color: #9090b0;
      margin-top: 6px;
      text-align: center;
    }

    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15,15,26,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      gap: 10px;
    }

    .overlay h2 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
    }

    .overlay p {
      font-size: 15px;
      color: #9090b0;
    }

    .chip-hint {
      font-size: 0.8rem;
      color: #a78bfa;
      margin: 0;
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="../../index.html" class="back-btn">← Back</a>
    <div class="header-title">🐍 Snake</div>
    <div class="chip-display">🪙 <span id="chipCount">—</span></div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Best</div>
      <div class="stat-value" id="best">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Time</div>
      <div class="stat-value" id="timer">0:00</div>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="480" height="640"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="overlay-title">🐍 Snake</h2>
      <p id="overlay-msg">Arrow keys or swipe to move</p>
      <p class="chip-hint">💰 Earn +100 chips per minute played</p>
      <button class="btn" onclick="startGame()">Start Game</button>
      <a href="../../index.html" style="color:#a78bfa;font-size:13px;text-decoration:none;margin-top:4px;opacity:0.85">← Back to Arcade</a>
    </div>
  </div>

  <div class="controls">
    <div class="status" id="status">Press Start to play</div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');
    const GRID   = 20;
    const COLS   = canvas.width  / GRID;  // 24
    const ROWS   = canvas.height / GRID;  // 32

    let snake, dir, nextDir, food, score, best, timerSecs, gameLoop, timerLoop, running;
    let countdownHandle = null;

    // ── Color phases — cycle infinitely every 50 pts ──────────
    const PHASES = [
      { head: '#a78bfa', body: '#7c3aed', glow: 'rgba(167,139,250,0.45)' }, // purple
      { head: '#22d3ee', body: '#0891b2', glow: 'rgba(34,211,238,0.45)'  }, // cyan
      { head: '#4ade80', body: '#16a34a', glow: 'rgba(74,222,128,0.45)'  }, // green
      { head: '#fb923c', body: '#ea580c', glow: 'rgba(251,146,60,0.45)'  }, // orange
      { head: '#f87171', body: '#dc2626', glow: 'rgba(248,113,113,0.45)' }, // red
    ];

    const FRUITS = ['🍎','🍐','🍓','🍇','🍊','🫐','🍉','🍋','🍑','🍒'];
    let currentFruit = '🍎';
    let currentPhase = 0;

    function getPhase(s) {
      // Cycle through phases every 50 pts — never stops
      return Math.floor(s / 50) % PHASES.length;
    }

    best = parseInt(localStorage.getItem('snakeBest') || '0');
    document.getElementById('best').textContent = best;

    // ── Web Audio ─────────────────────────────────────────────
    let audioCtx = null;

    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playEatSound() {
      try {
        const a = getAudio();
        const osc = a.createOscillator(), g = a.createGain();
        osc.connect(g); g.connect(a.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, a.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1047, a.currentTime + 0.08);
        g.gain.setValueAtTime(0.22, a.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.12);
        osc.start(a.currentTime); osc.stop(a.currentTime + 0.12);
      } catch(e) {}
    }

    function playPhaseSound(phaseIdx) {
      try {
        const a = getAudio();
        // Ascending arpeggio in the phase's colour "feel"
        const arpeggios = [
          [523, 659, 784, 1047], // purple — C major
          [554, 698, 831, 1109], // cyan   — C# major
          [587, 740, 880, 1175], // green  — D major
          [622, 784, 932, 1245], // orange — D# major
          [659, 831, 988, 1319], // red    — E major
        ];
        const freqs = arpeggios[phaseIdx] || arpeggios[0];
        freqs.forEach((freq, i) => {
          const osc = a.createOscillator(), g = a.createGain();
          osc.connect(g); g.connect(a.destination);
          osc.type = 'sine';
          osc.frequency.value = freq;
          const t = a.currentTime + i * 0.07;
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.2, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
          osc.start(t); osc.stop(t + 0.2);
        });
      } catch(e) {}
    }

    function playDeathSound() {
      try {
        const a = getAudio();
        const osc = a.createOscillator(), g = a.createGain();
        osc.connect(g); g.connect(a.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(220, a.currentTime);
        osc.frequency.exponentialRampToValueAtTime(55, a.currentTime + 0.5);
        g.gain.setValueAtTime(0.28, a.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.5);
        osc.start(a.currentTime); osc.stop(a.currentTime + 0.5);
      } catch(e) {}
    }

    // ── Game init / countdown ──────────────────────────────────
    function startGame() {
      // Initialise AudioContext on first user gesture
      try { getAudio(); } catch(e) {}

      document.getElementById('overlay').style.display = 'none';

      snake   = [{x: 12, y: 16}, {x: 11, y: 16}, {x: 10, y: 16}];
      dir     = {x: 1, y: 0};
      nextDir = {x: 1, y: 0};
      score   = 0;
      currentPhase = 0;
      timerSecs = 0;
      running = false;

      const scoreEl = document.getElementById('score');
      scoreEl.style.color = '';
      scoreEl.style.transform = '';
      document.getElementById('score').textContent = '0';
      document.getElementById('timer').textContent = '0:00';
      clearInterval(gameLoop);
      clearInterval(timerLoop);
      if (countdownHandle) clearTimeout(countdownHandle);

      placeFood();
      runCountdown(3);
    }

    function runCountdown(n) {
      draw();
      // Dark tint overlay on canvas
      ctx.fillStyle = 'rgba(12,13,20,0.65)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';

      if (n > 0) {
        ctx.font        = 'bold 110px Segoe UI, sans-serif';
        ctx.fillStyle   = PHASES[0].head;
        ctx.shadowColor = PHASES[0].glow;
        ctx.shadowBlur  = 40;
        ctx.fillText(n, canvas.width / 2, canvas.height / 2);
      } else {
        ctx.font        = 'bold 72px Segoe UI, sans-serif';
        ctx.fillStyle   = '#4ade80';
        ctx.shadowColor = 'rgba(74,222,128,0.7)';
        ctx.shadowBlur  = 40;
        ctx.fillText('GO!', canvas.width / 2, canvas.height / 2);
      }
      ctx.restore();

      if (n > 0) {
        countdownHandle = setTimeout(() => runCountdown(n - 1), 1000);
      } else {
        countdownHandle = setTimeout(beginGame, 500);
      }
    }

    function beginGame() {
      running = true;
      document.getElementById('status').textContent = 'Arrow keys or swipe to steer';
      gameLoop  = setInterval(tick, 120);
      timerLoop = setInterval(() => { timerSecs++; updateTimer(); }, 1000);
    }

    // ── Food ──────────────────────────────────────────────────
    function placeFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
      currentFruit = FRUITS[Math.floor(Math.random() * FRUITS.length)];
    }

    // ── Direction ─────────────────────────────────────────────
    function setDir(x, y) {
      if (x ===  1 && dir.x === -1) return;
      if (x === -1 && dir.x ===  1) return;
      if (y ===  1 && dir.y === -1) return;
      if (y === -1 && dir.y ===  1) return;
      nextDir = {x, y};
    }

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp')    setDir(0, -1);
      if (e.key === 'ArrowDown')  setDir(0,  1);
      if (e.key === 'ArrowLeft')  setDir(-1, 0);
      if (e.key === 'ArrowRight') setDir(1,  0);
    });

    // Touch swipe on canvas
    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      if (!running) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) < 18 && Math.abs(dy) < 18) return; // too small
      if (Math.abs(dx) > Math.abs(dy)) {
        setDir(dx > 0 ? 1 : -1, 0);
      } else {
        setDir(0, dy > 0 ? 1 : -1);
      }
      e.preventDefault();
    }, { passive: false });

    // ── Main tick ─────────────────────────────────────────────
    function tick() {
      dir = nextDir;
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { endGame(); return; }
      if (snake.some(s => s.x === head.x && s.y === head.y))             { endGame(); return; }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        updateScore(score + 10);
        playEatSound();
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    // ── Score & phase ─────────────────────────────────────────
    function updateScore(val) {
      const prevPhase = currentPhase;
      score = val;
      currentPhase = getPhase(score);
      document.getElementById('score').textContent = score;
      if (score > best) {
        best = score;
        localStorage.setItem('snakeBest', best);
        document.getElementById('best').textContent = best;
      }
      if (currentPhase !== prevPhase) {
        const el = document.getElementById('score');
        el.style.color     = PHASES[currentPhase].head;
        el.style.transform = 'scale(1.4)';
        setTimeout(() => { el.style.transform = ''; }, 250);
        playPhaseSound(currentPhase);
      }
    }

    function updateTimer() {
      const m = Math.floor(timerSecs / 60);
      const s = String(timerSecs % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }

    // ── End game ──────────────────────────────────────────────
    function endGame() {
      clearInterval(gameLoop);
      clearInterval(timerLoop);
      running = false;
      playDeathSound();

      const minutesPlayed = Math.floor(timerSecs / 60);
      const chipsEarned   = minutesPlayed * 100;
      const chipMsg = chipsEarned > 0 ? ` · 🪙 +${chipsEarned} chips` : '';

      document.getElementById('overlay-title').textContent = 'Game Over';
      document.getElementById('overlay-msg').textContent =
        `Score: ${score} · Time: ${document.getElementById('timer').textContent}${chipMsg}`;
      document.querySelector('#overlay .btn').textContent = 'Play Again';
      document.getElementById('overlay').style.display = 'flex';

      if (window.firestoreSaveScore) window.firestoreSaveScore('snake', score);
      if (chipsEarned > 0 && window.firestoreEarnChips) window.firestoreEarnChips(chipsEarned);
    }

    // ── Draw ──────────────────────────────────────────────────
    function draw() {
      const phase = PHASES[currentPhase];

      // Background
      ctx.fillStyle = '#1a1b28';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid dots
      ctx.fillStyle = '#ffffff08';
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.beginPath();
          ctx.arc(x * GRID + GRID / 2, y * GRID + GRID / 2, 1, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Food — bright glow circle + large emoji on top
      const fx = food.x * GRID + GRID / 2;
      const fy = food.y * GRID + GRID / 2;

      // Backing glow disc for contrast
      ctx.save();
      ctx.shadowColor = 'rgba(255,220,80,0.9)';
      ctx.shadowBlur  = 16;
      ctx.fillStyle   = 'rgba(255,230,80,0.18)';
      ctx.beginPath();
      ctx.arc(fx, fy, GRID / 2 + 1, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Emoji — sized bigger than cell so it's clearly visible
      ctx.save();
      ctx.shadowColor   = 'rgba(255,220,80,0.7)';
      ctx.shadowBlur    = 10;
      ctx.font          = `${GRID + 8}px serif`;
      ctx.textAlign     = 'center';
      ctx.textBaseline  = 'middle';
      ctx.fillText(currentFruit, fx, fy + 1);
      ctx.restore();

      // Snake body (drawn tail→neck so head renders on top)
      for (let i = snake.length - 1; i >= 1; i--) {
        const seg    = snake[i];
        const ratio  = 0.35 + 0.65 * (1 - i / snake.length);
        const shade  = i % 2 === 0 ? 1 : 0.78; // alternating scale texture
        const shrink = 1 + (i / snake.length) * 2;
        ctx.globalAlpha = ratio * shade;
        ctx.fillStyle   = phase.body;
        ctx.beginPath();
        ctx.roundRect(
          seg.x * GRID + shrink, seg.y * GRID + shrink,
          GRID - shrink * 2,     GRID - shrink * 2,
          3
        );
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Snake head — glowing rounded square
      if (snake.length > 0) {
        const head = snake[0];
        const hx = head.x * GRID;
        const hy = head.y * GRID;

        ctx.save();
        ctx.shadowColor = phase.glow;
        ctx.shadowBlur  = 14;
        ctx.fillStyle   = phase.head;
        ctx.beginPath();
        ctx.roundRect(hx + 1, hy + 1, GRID - 2, GRID - 2, 6);
        ctx.fill();
        ctx.restore();

        // Direction-aware eyes
        const cx = hx + GRID / 2, cy = hy + GRID / 2;
        let e1, e2;
        if      (dir.x ===  1) { e1 = {x: cx+3, y: cy-3}; e2 = {x: cx+3, y: cy+3}; }
        else if (dir.x === -1) { e1 = {x: cx-3, y: cy-3}; e2 = {x: cx-3, y: cy+3}; }
        else if (dir.y === -1) { e1 = {x: cx-3, y: cy-3}; e2 = {x: cx+3, y: cy-3}; }
        else                   { e1 = {x: cx-3, y: cy+3}; e2 = {x: cx+3, y: cy+3}; }

        ctx.fillStyle = '#fff';
        [e1, e2].forEach(e => { ctx.beginPath(); ctx.arc(e.x, e.y, 2.2, 0, Math.PI * 2); ctx.fill(); });
        ctx.fillStyle = '#0c0d14';
        [e1, e2].forEach(e => { ctx.beginPath(); ctx.arc(e.x, e.y, 1.1, 0, Math.PI * 2); ctx.fill(); });
      }
    }

    draw();
  </script>

  <!-- Firebase: save score + earn chips -->
  <script type="module">
    import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, serverTimestamp }
      from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyDT810ckpGIr0ExRp3S_bAO_NBnSGr5ALY",
      authDomain:        "gamezone-6487a.firebaseapp.com",
      projectId:         "gamezone-6487a",
      storageBucket:     "gamezone-6487a.firebasestorage.app",
      messagingSenderId: "266519256159",
      appId:             "1:266519256159:web:34d6be085083cda5ff4fea"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let currentUser = null;
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        try {
          const snap = await getDoc(doc(db, 'users', user.uid));
          const chips = snap.exists() ? (snap.data().chips || 0) : 0;
          document.getElementById('chipCount').textContent = chips.toLocaleString();
        } catch(e) {}
      }
    });

    window.firestoreSaveScore = async function(game, score) {
      if (!currentUser || score === 0) return;
      try {
        const ref  = doc(db, 'games', game, 'scores', currentUser.uid);
        const snap = await getDoc(ref);
        const prev = snap.exists() ? (snap.data().score || 0) : 0;
        if (score > prev) {
          await setDoc(ref, {
            userId:    currentUser.uid,
            username:  currentUser.displayName || currentUser.email.split('@')[0],
            score,
            updatedAt: serverTimestamp()
          });
        }
      } catch(err) { console.warn('Could not save score:', err); }
    };

    window.firestoreEarnChips = async function(amount) {
      if (!currentUser || amount <= 0) return;
      try {
        await updateDoc(doc(db, 'users', currentUser.uid), { chips: increment(amount) });
      } catch(err) { console.warn('Could not save chips:', err); }
    };
  </script>

</body>
</html>
