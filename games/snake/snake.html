<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake · PlayDen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0c0d14;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0 20px 20px;
    }

    .header {
      width: calc(100% + 40px);
      margin-left: -20px;
      margin-right: -20px;
      background: #1a1b28;
      border-bottom: 1px solid #2a2a4a;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }
    .back-btn {
      background: none;
      border: 1px solid #2a2a4a;
      color: #a78bfa;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      text-decoration: none;
    }
    .back-btn:hover { background: #2a2a4a; }
    .header-title { font-size: 18px; font-weight: 700; color: #a78bfa; }
    .chip-display {
      background: #0c0d14;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      white-space: nowrap;
    }
    .chip-display span { font-weight: 700; color: #a78bfa; }

    .stats {
      display: flex;
      gap: 24px;
      margin-bottom: 16px;
    }
    .stat { text-align: center; }
    .stat-label {
      font-size: 11px;
      color: #9090b0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #a78bfa;
      transition: transform 0.25s, color 0.25s;
    }

    .canvas-wrap {
      position: relative;
      width: 100%;
      max-width: 480px;
    }
    canvas {
      background: #1a1b28;
      border: 2px solid #2a2a4a;
      border-radius: 12px;
      display: block;
      width: 100%;
      height: auto;
      touch-action: none;
    }

    /* Food elements: HTML positioned for crisp emoji on all devices */
    .food-emoji {
      position: absolute;
      font-size: 22px;
      line-height: 1;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transform-origin: center;
      filter: drop-shadow(0 0 5px rgba(255, 210, 60, 0.85));
      z-index: 2;
      display: none;
      transition: none;
    }

    .controls { margin-top: 12px; }
    .btn {
      background: #7c3aed;
      color: #fff;
      border: none;
      padding: 10px 32px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #6d28d9; }
    .status {
      font-size: 13px;
      color: #9090b0;
      margin-top: 6px;
      text-align: center;
    }

    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15,15,26,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      gap: 10px;
      z-index: 10;
    }
    .overlay h2 { font-size: 28px; font-weight: 700; color: #fff; }
    .overlay p  { font-size: 15px; color: #9090b0; }
    .chip-hint  { font-size: 0.8rem; color: #a78bfa; margin: 0; opacity: 0.9; }
  </style>
</head>
<body>

  <div class="header">
    <a href="../../index.html" class="back-btn">← Back</a>
    <div class="header-title">Snake</div>
    <div class="chip-display">🪙 <span id="chipCount">—</span></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="score">0</div></div>
    <div class="stat"><div class="stat-label">Best</div><div class="stat-value" id="best">0</div></div>
    <div class="stat"><div class="stat-label">Time</div><div class="stat-value" id="timer">0:00</div></div>
  </div>

  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="480" height="640"></canvas>
    <span class="food-emoji" id="food0"></span>
    <span class="food-emoji" id="food1"></span>
    <div class="overlay" id="overlay">
      <img src="snake.png" alt="Snake" style="width:140px;height:79px;object-fit:cover;border-radius:10px;margin-bottom:2px;">
      <h2 id="overlay-title">Snake</h2>
      <p id="overlay-msg">Arrow keys or swipe to move</p>
      <p class="chip-hint">💰 Earn +100 chips per minute played</p>
      <button class="btn" onclick="startGame()">Start Game</button>
      <a href="../../index.html" style="color:#a78bfa;font-size:13px;text-decoration:none;margin-top:4px;opacity:0.85">← Back to Arcade</a>
    </div>
  </div>

  <div class="controls">
    <div class="status" id="status">Press Start to play</div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');
    const GRID   = 20;
    const COLS   = canvas.width  / GRID;  // 24
    const ROWS   = canvas.height / GRID;  // 32
    const TICK_MS = 130;    // ms per step
    const FOOD_LIFE = 5000; // ms before food expires
    const FOOD_WARN = 2500; // ms remaining when warning starts

    // ── Color phases (cycle infinitely every 50pts) ───────────
    const PHASES = [
      { head: '#a78bfa', body: '#7c3aed', glow: 'rgba(167,139,250,0.5)' },
      { head: '#22d3ee', body: '#0891b2', glow: 'rgba(34,211,238,0.5)'  },
      { head: '#4ade80', body: '#16a34a', glow: 'rgba(74,222,128,0.5)'  },
      { head: '#fb923c', body: '#ea580c', glow: 'rgba(251,146,60,0.5)'  },
      { head: '#f87171', body: '#dc2626', glow: 'rgba(248,113,113,0.5)' },
    ];
    const FRUITS = ['🍎','🍐','🍓','🍇','🍊','🫐','🍉','🍋','🍑','🍒'];

    let snake, dir, nextDir, foods;
    let score, best, timerSecs, timerLoop;
    let running = false, inCountdown = false;
    let currentPhase = 0;
    let prevHeadX = 0, prevHeadY = 0;  // for head interpolation
    let lastTickTime = 0, rafId = null;
    let countdownHandle = null;
    let particles = [];

    best = parseInt(localStorage.getItem('snakeBest') || '0');
    document.getElementById('best').textContent = best;

    function getPhase(s) { return Math.floor(s / 50) % PHASES.length; }

    // ── Web Audio ─────────────────────────────────────────────
    let audioCtx = null;
    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playTone(freq, dur, type = 'sine', vol = 0.2, startDelay = 0) {
      try {
        const a = getAudio();
        const osc = a.createOscillator(), g = a.createGain();
        osc.connect(g); g.connect(a.destination);
        osc.type = type; osc.frequency.value = freq;
        const t = a.currentTime + startDelay;
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.start(t); osc.stop(t + dur);
      } catch(e) {}
    }

    function playCountdownBeep(isGo) {
      if (isGo) { playTone(660, 0.1, 'sine', 0.25); playTone(880, 0.25, 'sine', 0.3, 0.1); }
      else        { playTone(330, 0.1, 'sine', 0.18); }
    }

    function playEatSound() {
      try {
        const a = getAudio();
        const osc = a.createOscillator(), g = a.createGain();
        osc.connect(g); g.connect(a.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, a.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1047, a.currentTime + 0.08);
        g.gain.setValueAtTime(0.22, a.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.12);
        osc.start(a.currentTime); osc.stop(a.currentTime + 0.12);
      } catch(e) {}
    }

    function playPhaseSound(idx) {
      try {
        const a = getAudio();
        [[523,659,784,1047],[554,698,831,1109],[587,740,880,1175],
         [622,784,932,1245],[659,831,988,1319]][idx]
        .forEach((f,i) => {
          const osc = a.createOscillator(), g = a.createGain();
          osc.connect(g); g.connect(a.destination);
          osc.type = 'sine'; osc.frequency.value = f;
          const t = a.currentTime + i * 0.07;
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.2, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
          osc.start(t); osc.stop(t + 0.2);
        });
      } catch(e) {}
    }

    function playExplosionSound() {
      try {
        const a = getAudio();
        // Sawtooth crack
        const o1 = a.createOscillator(), g1 = a.createGain();
        o1.connect(g1); g1.connect(a.destination);
        o1.type = 'sawtooth';
        o1.frequency.setValueAtTime(180, a.currentTime);
        o1.frequency.exponentialRampToValueAtTime(40, a.currentTime + 0.35);
        g1.gain.setValueAtTime(0.5, a.currentTime);
        g1.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.35);
        o1.start(a.currentTime); o1.stop(a.currentTime + 0.35);
        // Sub boom
        const o2 = a.createOscillator(), g2 = a.createGain();
        o2.connect(g2); g2.connect(a.destination);
        o2.type = 'sine';
        o2.frequency.setValueAtTime(90, a.currentTime);
        o2.frequency.exponentialRampToValueAtTime(22, a.currentTime + 0.55);
        g2.gain.setValueAtTime(0.4, a.currentTime);
        g2.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.55);
        o2.start(a.currentTime); o2.stop(a.currentTime + 0.55);
      } catch(e) {}
    }

    // ── Particles (explosion) ─────────────────────────────────
    function spawnExplosion(gx, gy, color) {
      const cx = gx * GRID + GRID / 2;
      const cy = gy * GRID + GRID / 2;
      for (let i = 0; i < 28; i++) {
        const angle = (Math.PI * 2 * i / 28) + Math.random() * 0.4;
        const speed = 1.5 + Math.random() * 4;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 1,
          life: 1.0,
          decay: 0.03 + Math.random() * 0.025,
          r: 2 + Math.random() * 4,
          color
        });
      }
    }

    function updateParticles() {
      particles.forEach(p => {
        p.x += p.vx * 2;
        p.y += p.vy * 2;
        p.vy += 0.15; // gravity
        p.life -= p.decay;
      });
      particles = particles.filter(p => p.life > 0);
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    }

    // ── Food ──────────────────────────────────────────────────
    function newFoodPos() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (
        snake.some(s => s.x === pos.x && s.y === pos.y) ||
        (foods && foods.some(f => f && f.x === pos.x && f.y === pos.y))
      );
      return { ...pos, fruit: FRUITS[Math.floor(Math.random() * FRUITS.length)], placedAt: Date.now() };
    }

    function initFoods() {
      foods = [];
      foods.push(newFoodPos());
      foods.push(newFoodPos());
    }

    function checkFoodExpiry() {
      const now = Date.now();
      let changed = false;
      foods.forEach((f, i) => {
        if (now - f.placedAt >= FOOD_LIFE) { foods[i] = newFoodPos(); changed = true; }
      });
      return changed;
    }

    // Update HTML food elements (called every frame for expiry animation)
    function updateFoodDOM() {
      if (!foods) return;
      const now = Date.now();
      const scaleX = canvas.clientWidth  / canvas.width;
      const scaleY = canvas.clientHeight / canvas.height;
      foods.forEach((f, i) => {
        const el = document.getElementById(`food${i}`);
        if (!el || !f) return;
        el.textContent   = f.fruit;
        el.style.left    = (f.x * GRID + GRID / 2) * scaleX + 'px';
        el.style.top     = (f.y * GRID + GRID / 2) * scaleY + 'px';
        el.style.display = 'block';

        const remaining = FOOD_LIFE - (now - f.placedAt);
        if (remaining < FOOD_WARN) {
          const ratio = remaining / FOOD_WARN;                // 1→0
          const pulse = 1 + 0.18 * Math.sin(now / (80 * ratio + 30)); // faster pulse as it expires
          const scale = (0.5 + 0.5 * ratio) * pulse;
          el.style.opacity   = 0.3 + 0.7 * ratio;
          el.style.transform = `translate(-50%, -50%) scale(${scale})`;
        } else {
          el.style.opacity   = '1';
          el.style.transform = 'translate(-50%, -50%) scale(1)';
        }
      });
    }

    function hideFoodDOM() {
      ['food0','food1'].forEach(id => {
        document.getElementById(id).style.display = 'none';
      });
    }

    window.addEventListener('resize', updateFoodDOM);

    // ── Direction ─────────────────────────────────────────────
    function setDir(x, y) {
      if (x ===  1 && dir.x === -1) return;
      if (x === -1 && dir.x ===  1) return;
      if (y ===  1 && dir.y === -1) return;
      if (y === -1 && dir.y ===  1) return;
      nextDir = {x, y};
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp')    { e.preventDefault(); setDir(0, -1); }
      if (e.key === 'ArrowDown')  { e.preventDefault(); setDir(0,  1); }
      if (e.key === 'ArrowLeft')  { e.preventDefault(); setDir(-1, 0); }
      if (e.key === 'ArrowRight') { e.preventDefault(); setDir(1,  0); }
    });

    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchend', e => {
      if (!running) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) < 18 && Math.abs(dy) < 18) return;
      if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
      else                             setDir(0, dy > 0 ? 1 : -1);
      e.preventDefault();
    }, { passive: false });

    // ── Game init ─────────────────────────────────────────────
    function startGame() {
      try { getAudio(); } catch(e) {}
      document.getElementById('overlay').style.display = 'none';

      snake   = [{x:12, y:16, px:12, py:16}, {x:11, y:16, px:11, py:16}, {x:10, y:16, px:10, py:16}];
      dir     = {x:1, y:0};
      nextDir = {x:1, y:0};
      prevHeadX = 12; prevHeadY = 16;
      score = 0; currentPhase = 0; timerSecs = 0;
      particles = [];
      running = false; inCountdown = true;

      const scoreEl = document.getElementById('score');
      scoreEl.style.color = ''; scoreEl.style.transform = '';
      document.getElementById('score').textContent = '0';
      document.getElementById('timer').textContent = '0:00';
      clearInterval(timerLoop);
      if (countdownHandle) clearTimeout(countdownHandle);
      if (rafId) cancelAnimationFrame(rafId);

      initFoods();
      runCountdown(3);
    }

    function runCountdown(n) {
      playCountdownBeep(n === 0);
      draw(1);
      ctx.fillStyle = 'rgba(12,13,20,0.62)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      if (n > 0) {
        ctx.font = 'bold 110px Segoe UI, sans-serif';
        ctx.fillStyle = PHASES[0].head;
        ctx.shadowColor = PHASES[0].glow; ctx.shadowBlur = 40;
        ctx.fillText(n, canvas.width / 2, canvas.height / 2);
      } else {
        ctx.font = 'bold 72px Segoe UI, sans-serif';
        ctx.fillStyle = '#4ade80';
        ctx.shadowColor = 'rgba(74,222,128,0.7)'; ctx.shadowBlur = 40;
        ctx.fillText('GO!', canvas.width / 2, canvas.height / 2);
      }
      ctx.restore();

      if (n > 0) countdownHandle = setTimeout(() => runCountdown(n - 1), 1000);
      else        countdownHandle = setTimeout(beginGame, 500);
    }

    function beginGame() {
      inCountdown = false;
      running = true;
      lastTickTime = performance.now();
      // Reset food timers NOW (after countdown) so the 5s starts from when gameplay begins
      const now = Date.now();
      if (foods) foods.forEach(f => { f.placedAt = now; });
      document.getElementById('status').textContent = 'Arrow keys or swipe to steer';
      timerLoop = setInterval(() => { timerSecs++; updateTimer(); }, 1000);
      rafId = requestAnimationFrame(gameFrame);
    }

    // ── Main game loop (requestAnimationFrame) ────────────────
    function gameFrame(now) {
      if (!running) { rafId = null; return; }
      rafId = requestAnimationFrame(gameFrame);

      const elapsed = now - lastTickTime;
      let t;

      if (elapsed >= TICK_MS) {
        // A logic tick fires this frame — reset timer and advance state
        lastTickTime = now;
        tick();
        if (!running) return; // tick may have called endGame
        // Draw at t=0 right after tick so next frames interpolate forward cleanly
        // This prevents the head from jumping back after reaching t=1
        t = 0;
      } else {
        t = elapsed / TICK_MS;
      }

      checkFoodExpiry();
      updateFoodDOM();
      draw(t);
    }

    // ── Logic tick ────────────────────────────────────────────
    function tick() {
      dir = nextDir;

      // Save previous head for interpolation
      prevHeadX = snake[0].x;
      prevHeadY = snake[0].y;

      const head = {
        x: snake[0].x + dir.x,
        y: snake[0].y + dir.y,
        px: snake[0].x, py: snake[0].y
      };

      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { endGame(); return; }
      if (snake.some(s => s.x === head.x && s.y === head.y))             { endGame(); return; }

      snake.unshift(head);

      const eatenIdx = foods.findIndex(f => head.x === f.x && head.y === f.y);
      if (eatenIdx >= 0) {
        updateScore(score + 10);
        playEatSound();
        foods[eatenIdx] = newFoodPos();
      } else {
        snake.pop();
      }
    }

    // ── Score ─────────────────────────────────────────────────
    function updateScore(val) {
      const prev = currentPhase;
      score = val;
      currentPhase = getPhase(score);
      document.getElementById('score').textContent = score;
      if (score > best) {
        best = score;
        localStorage.setItem('snakeBest', best);
        document.getElementById('best').textContent = best;
      }
      if (currentPhase !== prev) {
        const el = document.getElementById('score');
        el.style.color = PHASES[currentPhase].head;
        el.style.transform = 'scale(1.4)';
        setTimeout(() => { el.style.transform = ''; }, 250);
        playPhaseSound(currentPhase);
      }
    }

    function updateTimer() {
      const m = Math.floor(timerSecs / 60);
      const s = String(timerSecs % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }

    // ── End game ──────────────────────────────────────────────
    function endGame() {
      running = false;
      clearInterval(timerLoop);
      hideFoodDOM();
      playExplosionSound();
      spawnExplosion(snake[0].x, snake[0].y, PHASES[currentPhase].head);

      // Continue animating the explosion, then show overlay
      function explosionFrame() {
        updateParticles();
        draw(1); // draw at final position
        if (particles.length > 0) {
          requestAnimationFrame(explosionFrame);
        } else {
          showGameOver();
        }
      }
      requestAnimationFrame(explosionFrame);
    }

    function showGameOver() {
      const minutesPlayed = Math.floor(timerSecs / 60);
      const chipsEarned   = minutesPlayed * 100;
      const chipMsg = chipsEarned > 0 ? ` · 🪙 +${chipsEarned} chips` : '';
      document.getElementById('overlay-title').textContent = 'Game Over';
      document.getElementById('overlay-msg').textContent =
        `Score: ${score} · Time: ${document.getElementById('timer').textContent}${chipMsg}`;
      document.querySelector('#overlay .btn').textContent = 'Play Again';
      document.getElementById('overlay').style.display = 'flex';
      if (window.firestoreSaveScore) window.firestoreSaveScore('snake', score);
      const chipsEarned2 = Math.floor(timerSecs / 60) * 100;
      if (chipsEarned2 > 0 && window.firestoreEarnChips) window.firestoreEarnChips(chipsEarned2);
    }

    // ── Draw (t = interpolation factor 0→1 between ticks) ────
    function draw(t) {
      const phase = PHASES[currentPhase];

      ctx.fillStyle = '#1a1b28';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid dots
      ctx.fillStyle = '#ffffff08';
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.beginPath();
          ctx.arc(x * GRID + GRID / 2, y * GRID + GRID / 2, 1, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Snake body — circle segments + rectangular connectors for smooth rounded turns
      for (let i = snake.length - 1; i >= 1; i--) {
        const seg  = snake[i];
        const next = snake[i - 1];
        const ratio  = 0.35 + 0.65 * (1 - i / snake.length);
        const shade  = i % 2 === 0 ? 1 : 0.88;
        const shrink = 1 + (i / snake.length) * 1.5;
        const r  = GRID / 2 - shrink;
        const cx = seg.x * GRID + GRID / 2;
        const cy = seg.y * GRID + GRID / 2;
        const ncx = next.x * GRID + GRID / 2;
        const ncy = next.y * GRID + GRID / 2;

        ctx.globalAlpha = ratio * shade;
        ctx.fillStyle   = phase.body;

        // Connector rectangle to next segment (fills the gap at turns)
        ctx.beginPath();
        if (seg.x === next.x) {
          ctx.rect(cx - r, Math.min(cy, ncy), r * 2, Math.abs(cy - ncy));
        } else {
          ctx.rect(Math.min(cx, ncx), cy - r, Math.abs(cx - ncx), r * 2);
        }
        ctx.fill();

        // Circle at segment position
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Snake head — smooth interpolation between prevHead and current head
      if (snake.length > 0) {
        const hx = (prevHeadX + (snake[0].x - prevHeadX) * t) * GRID;
        const hy = (prevHeadY + (snake[0].y - prevHeadY) * t) * GRID;

        ctx.save();
        ctx.shadowColor = phase.glow;
        ctx.shadowBlur  = 14;
        ctx.fillStyle   = phase.head;
        ctx.beginPath();
        ctx.roundRect(hx + 1, hy + 1, GRID - 2, GRID - 2, 6);
        ctx.fill();
        ctx.restore();

        // Direction-aware eyes
        const cx = hx + GRID / 2, cy = hy + GRID / 2;
        let e1, e2;
        if      (dir.x ===  1) { e1={x:cx+3,y:cy-3}; e2={x:cx+3,y:cy+3}; }
        else if (dir.x === -1) { e1={x:cx-3,y:cy-3}; e2={x:cx-3,y:cy+3}; }
        else if (dir.y === -1) { e1={x:cx-3,y:cy-3}; e2={x:cx+3,y:cy-3}; }
        else                   { e1={x:cx-3,y:cy+3}; e2={x:cx+3,y:cy+3}; }

        ctx.fillStyle = '#fff';
        [e1,e2].forEach(e => { ctx.beginPath(); ctx.arc(e.x,e.y,2.2,0,Math.PI*2); ctx.fill(); });
        ctx.fillStyle = '#0c0d14';
        [e1,e2].forEach(e => { ctx.beginPath(); ctx.arc(e.x,e.y,1.1,0,Math.PI*2); ctx.fill(); });
      }

      // Explosion particles
      drawParticles();
    }

    draw(1);
  </script>

  <script type="module">
    import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, serverTimestamp }
      from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyDT810ckpGIr0ExRp3S_bAO_NBnSGr5ALY",
      authDomain:        "gamezone-6487a.firebaseapp.com",
      projectId:         "gamezone-6487a",
      storageBucket:     "gamezone-6487a.firebasestorage.app",
      messagingSenderId: "266519256159",
      appId:             "1:266519256159:web:34d6be085083cda5ff4fea"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let currentUser = null;
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        try {
          const snap = await getDoc(doc(db, 'users', user.uid));
          const chips = snap.exists() ? (snap.data().chips || 0) : 0;
          document.getElementById('chipCount').textContent = chips.toLocaleString();
        } catch(e) {}
      }
    });

    window.firestoreSaveScore = async function(game, score) {
      if (!currentUser || score === 0) return;
      try {
        const ref  = doc(db, 'games', game, 'scores', currentUser.uid);
        const snap = await getDoc(ref);
        const prev = snap.exists() ? (snap.data().score || 0) : 0;
        if (score > prev) {
          await setDoc(ref, { userId: currentUser.uid,
            username: currentUser.displayName || currentUser.email.split('@')[0],
            score, updatedAt: serverTimestamp() });
        }
      } catch(e) {}
    };

    window.firestoreEarnChips = async function(amount) {
      if (!currentUser || amount <= 0) return;
      try { await updateDoc(doc(db, 'users', currentUser.uid), { chips: increment(amount) }); }
      catch(e) {}
    };
  </script>
