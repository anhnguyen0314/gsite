<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake · PlayDen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0c0d14;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0 20px 20px;
    }

    .header {
      width: calc(100% + 40px);
      margin-left: -20px;
      margin-right: -20px;
      background: #1a1b28;
      border-bottom: 1px solid #2a2a4a;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }

    .back-btn {
      background: none;
      border: 1px solid #2a2a4a;
      color: #a78bfa;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      text-decoration: none;
    }

    .back-btn:hover { background: #2a2a4a; }

    .header-title { font-size: 18px; font-weight: 700; color: #a78bfa; }

    .chip-display {
      background: #0c0d14;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      white-space: nowrap;
    }
    .chip-display span { font-weight: 700; color: #a78bfa; }

    .stats {
      display: flex;
      gap: 24px;
      margin-bottom: 16px;
    }

    .stat {
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: #9090b0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #a78bfa;
    }

    canvas {
      background: #1a1b28;
      border: 2px solid #2a2a4a;
      border-radius: 12px;
      display: block;
      max-width: 100%;
    }

    .controls {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .btn {
      background: #7c3aed;
      color: #fff;
      border: none;
      padding: 10px 32px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #6d28d9; }

    .status {
      font-size: 14px;
      color: #9090b0;
      margin-top: 4px;
    }

    /* Mobile d-pad */
    .dpad {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-top: 16px;
    }

    .dpad-row {
      display: flex;
      gap: 4px;
    }

    .dpad-btn {
      width: 56px;
      height: 56px;
      background: #1a1b28;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      color: #a78bfa;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .dpad-btn:active { background: #2a2a4a; }

    @media (max-width: 600px) {
      .dpad { display: flex; }
    }

    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15,15,26,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      gap: 10px;
    }

    .overlay h2 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
    }

    .overlay p {
      font-size: 15px;
      color: #9090b0;
    }

    .chip-hint {
      font-size: 0.8rem;
      color: #a78bfa;
      margin: 0;
      opacity: 0.9;
    }

    .canvas-wrap {
      position: relative;
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="../../index.html" class="back-btn">← Back</a>
    <div class="header-title">🐍 Snake</div>
    <div class="chip-display">🪙 <span id="chipCount">—</span></div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Best</div>
      <div class="stat-value" id="best">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Time</div>
      <div class="stat-value" id="timer">0:00</div>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="480" height="480"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="overlay-title">Snake</h2>
      <p id="overlay-msg">Use arrow keys or the d-pad to move</p>
      <p class="chip-hint">💰 Earn +100 chips per minute played</p>
      <button class="btn" onclick="startGame()">Start Game</button>
      <a href="../../index.html" style="color:#a78bfa;font-size:13px;text-decoration:none;margin-top:4px;opacity:0.85">← Back to Arcade</a>
    </div>
  </div>

  <div class="controls">
    <div class="status" id="status">Press Start to play</div>
  </div>

  <!-- Mobile d-pad -->
  <div class="dpad">
    <div class="dpad-row">
      <div class="dpad-btn" onclick="setDir(0,-1)">▲</div>
    </div>
    <div class="dpad-row">
      <div class="dpad-btn" onclick="setDir(-1,0)">◀</div>
      <div style="width:56px;height:56px"></div>
      <div class="dpad-btn" onclick="setDir(1,0)">▶</div>
    </div>
    <div class="dpad-row">
      <div class="dpad-btn" onclick="setDir(0,1)">▼</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    let snake, dir, nextDir, food, score, best, timerSecs, gameLoop, timerLoop, running;

    // Color phases: [headColor, bodyColor, glowColor] triggered at score thresholds
    const PHASES = [
      { score: 0,   head: '#a78bfa', body: '#7c3aed', glow: 'rgba(167,139,250,0.4)'  }, // purple
      { score: 50,  head: '#22d3ee', body: '#0891b2', glow: 'rgba(34,211,238,0.4)'   }, // cyan
      { score: 100, head: '#4ade80', body: '#16a34a', glow: 'rgba(74,222,128,0.4)'   }, // green
      { score: 150, head: '#fb923c', body: '#ea580c', glow: 'rgba(251,146,60,0.4)'   }, // orange
      { score: 200, head: '#f87171', body: '#dc2626', glow: 'rgba(248,113,113,0.4)'  }, // red
    ];

    const FRUITS = ['🍎','🍐','🍓','🍇','🍊','🫐','🍉','🍋','🍑','🍒'];
    let currentFruit = '🍎';
    let currentPhase = 0;

    function getPhase(s) {
      let p = 0;
      for (let i = 0; i < PHASES.length; i++) {
        if (s >= PHASES[i].score) p = i;
      }
      return p;
    }

    best = parseInt(localStorage.getItem('snakeBest') || '0');
    document.getElementById('best').textContent = best;

    function startGame() {
      document.getElementById('overlay').style.display = 'none';
      snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
      dir = {x: 1, y: 0};
      nextDir = {x: 1, y: 0};
      score = 0;
      currentPhase = 0;
      timerSecs = 0;
      running = true;
      const scoreEl = document.getElementById('score');
      scoreEl.style.color = '';
      scoreEl.style.transform = '';
      updateScore(0);
      updateTimer();
      placeFood();
      clearInterval(gameLoop);
      clearInterval(timerLoop);
      gameLoop = setInterval(tick, 120);
      timerLoop = setInterval(() => {
        timerSecs++;
        updateTimer();
      }, 1000);
      document.getElementById('status').textContent = 'Use arrow keys or d-pad to move';
    }

    function placeFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
      currentFruit = FRUITS[Math.floor(Math.random() * FRUITS.length)];
    }

    function setDir(x, y) {
      if (x === 1 && dir.x === -1) return;
      if (x === -1 && dir.x === 1) return;
      if (y === 1 && dir.y === -1) return;
      if (y === -1 && dir.y === 1) return;
      nextDir = {x, y};
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp')    setDir(0, -1);
      if (e.key === 'ArrowDown')  setDir(0,  1);
      if (e.key === 'ArrowLeft')  setDir(-1, 0);
      if (e.key === 'ArrowRight') setDir(1,  0);
    });

    function tick() {
      dir = nextDir;
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        endGame(); return;
      }

      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        endGame(); return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        updateScore(score + 10);
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function updateScore(val) {
      const prevPhase = currentPhase;
      score = val;
      currentPhase = getPhase(score);
      document.getElementById('score').textContent = score;
      if (score > best) {
        best = score;
        localStorage.setItem('snakeBest', best);
        document.getElementById('best').textContent = best;
      }
      // Flash score element on phase change
      if (currentPhase !== prevPhase) {
        const el = document.getElementById('score');
        el.style.color = PHASES[currentPhase].head;
        el.style.transform = 'scale(1.4)';
        el.style.transition = 'transform 0.25s, color 0.25s';
        setTimeout(() => {
          el.style.transform = '';
        }, 250);
      }
    }

    function updateTimer() {
      const m = Math.floor(timerSecs / 60);
      const s = String(timerSecs % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }

    function endGame() {
      clearInterval(gameLoop);
      clearInterval(timerLoop);
      running = false;
      const overlay = document.getElementById('overlay');
      document.getElementById('overlay-title').textContent = 'Game Over';
      // Chips earned: 100 per full minute played
      const minutesPlayed = Math.floor(timerSecs / 60);
      const chipsEarned   = minutesPlayed * 100;
      const chipMsg = chipsEarned > 0 ? ` · 🪙 +${chipsEarned} chips` : '';
      document.getElementById('overlay-msg').textContent =
        `Score: ${score} · Time: ${document.getElementById('timer').textContent}${chipMsg}`;
      document.querySelector('#overlay .btn').textContent = 'Play Again';
      overlay.style.display = 'flex';
      // Save score and earn chips
      if (window.firestoreSaveScore) window.firestoreSaveScore('snake', score);
      if (chipsEarned > 0 && window.firestoreEarnChips) window.firestoreEarnChips(chipsEarned);
    }

    function draw() {
      const phase = PHASES[currentPhase];

      ctx.fillStyle = '#1a1b28';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid dots
      ctx.fillStyle = '#ffffff08';
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.beginPath();
          ctx.arc(x * GRID + GRID/2, y * GRID + GRID/2, 1, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Food — fruit emoji with subtle glow
      const fx = food.x * GRID + GRID / 2;
      const fy = food.y * GRID + GRID / 2;
      ctx.save();
      ctx.shadowColor = 'rgba(255,200,0,0.5)';
      ctx.shadowBlur = 8;
      ctx.font = `${GRID - 2}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(currentFruit, fx, fy + 1);
      ctx.restore();

      // Snake body (tail → neck, fade opacity)
      for (let i = snake.length - 1; i >= 1; i--) {
        const seg = snake[i];
        const ratio = 0.35 + 0.65 * (1 - i / snake.length);
        // Alternate shade for scale effect
        const shade = i % 2 === 0 ? 1 : 0.78;
        ctx.fillStyle = phase.body;
        ctx.globalAlpha = ratio * shade;
        ctx.beginPath();
        const shrink = 1 + (i / snake.length) * 2; // tail gets slightly smaller
        ctx.roundRect(
          seg.x * GRID + shrink,
          seg.y * GRID + shrink,
          GRID - shrink * 2,
          GRID - shrink * 2,
          3
        );
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Snake head with glow + eyes
      if (snake.length > 0) {
        const head = snake[0];
        const hx = head.x * GRID;
        const hy = head.y * GRID;

        // Glow
        ctx.save();
        ctx.shadowColor = phase.glow;
        ctx.shadowBlur = 12;
        ctx.fillStyle = phase.head;
        ctx.beginPath();
        ctx.roundRect(hx + 1, hy + 1, GRID - 2, GRID - 2, 6);
        ctx.fill();
        ctx.restore();

        // Eyes — direction-aware placement
        const cx = hx + GRID / 2;
        const cy = hy + GRID / 2;
        const eyeR = 2.2;
        const pupilR = 1.1;
        // Offsets relative to head center based on direction
        let e1, e2;
        if (dir.x === 1)       { e1 = {x: cx+3, y: cy-3}; e2 = {x: cx+3, y: cy+3}; }
        else if (dir.x === -1) { e1 = {x: cx-3, y: cy-3}; e2 = {x: cx-3, y: cy+3}; }
        else if (dir.y === -1) { e1 = {x: cx-3, y: cy-3}; e2 = {x: cx+3, y: cy-3}; }
        else                   { e1 = {x: cx-3, y: cy+3}; e2 = {x: cx+3, y: cy+3}; }

        // White of eye
        ctx.fillStyle = '#fff';
        [e1, e2].forEach(e => {
          ctx.beginPath();
          ctx.arc(e.x, e.y, eyeR, 0, Math.PI * 2);
          ctx.fill();
        });
        // Pupil
        ctx.fillStyle = '#0c0d14';
        [e1, e2].forEach(e => {
          ctx.beginPath();
          ctx.arc(e.x, e.y, pupilR, 0, Math.PI * 2);
          ctx.fill();
        });
      }
    }

    draw();
  </script>

  <!-- Firebase: save score to Firestore when logged in -->
  <script type="module">
    import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, serverTimestamp }
      from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyDT810ckpGIr0ExRp3S_bAO_NBnSGr5ALY",
      authDomain:        "gamezone-6487a.firebaseapp.com",
      projectId:         "gamezone-6487a",
      storageBucket:     "gamezone-6487a.firebasestorage.app",
      messagingSenderId: "266519256159",
      appId:             "1:266519256159:web:34d6be085083cda5ff4fea"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let currentUser = null;
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        try {
          const snap = await getDoc(doc(db, 'users', user.uid));
          const chips = snap.exists() ? (snap.data().chips || 0) : 0;
          document.getElementById('chipCount').textContent = chips.toLocaleString();
        } catch(e) {}
      }
    });

    window.firestoreSaveScore = async function(game, score) {
      if (!currentUser || score === 0) return;
      try {
        const ref  = doc(db, 'games', game, 'scores', currentUser.uid);
        const snap = await getDoc(ref);
        const prev = snap.exists() ? (snap.data().score || 0) : 0;
        if (score > prev) {
          await setDoc(ref, {
            userId:    currentUser.uid,
            username:  currentUser.displayName || currentUser.email.split('@')[0],
            score,
            updatedAt: serverTimestamp()
          });
        }
      } catch (err) {
        console.warn('Could not save score to Firestore:', err);
      }
    };

    window.firestoreEarnChips = async function(amount) {
      if (!currentUser || amount <= 0) return;
      try {
        await updateDoc(doc(db, 'users', currentUser.uid), {
          chips: increment(amount)
        });
      } catch (err) {
        console.warn('Could not save chips to Firestore:', err);
      }
    };
  </script>

</body>
</html>
