<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Poker — PlayDen</title>
  <link rel="stylesheet" href="../../style.css"/>
  <style>
    * { box-sizing: border-box; }
    body { background: #0a0a14; overflow-x: hidden; }

    /* ── Layout ── */
    .game-wrap {
      max-width: 700px;
      margin: 0 auto;
      padding: 12px 12px 100px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .top-bar h2 { font-size: 17px; font-weight: 700; color: #fff; }
    .top-bar-right { display: flex; align-items: center; gap: 10px; }

    .btn-leave {
      background: transparent;
      border: 1px solid #3a3a6a;
      border-radius: 8px;
      color: #9090b0;
      padding: 7px 14px;
      font-size: 13px;
      font-family: 'Segoe UI', sans-serif;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-leave:hover { background: #1a1a2e; color: #e0e0e0; }

    .chips-badge {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 13px;
      color: #9090b0;
      white-space: nowrap;
    }
    .chips-badge strong { color: #a78bfa; }

    /* ── Opponents row ── */
    .opponents-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
      min-height: 90px;
    }

    .opp-pod {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 14px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      min-width: 100px;
      max-width: 150px;
      flex: 1;
      position: relative;
      transition: border-color 0.2s;
    }
    .opp-pod.active { border-color: #a78bfa; box-shadow: 0 0 10px rgba(167,139,250,0.25); }
    .opp-pod.folded { opacity: 0.4; }

    .opp-avatar {
      width: 34px; height: 34px;
      background: #2a2a4a;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .opp-name {
      font-size: 12px; font-weight: 600; color: #d0d0e0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 120px; text-align: center;
    }
    .opp-chips { font-size: 11px; color: #facc15; }
    .opp-bet   { font-size: 11px; color: #a78bfa; }

    .opp-cards { display: flex; gap: 3px; }
    .opp-cards .card { width: 34px; height: 48px; font-size: 12px; }
    .opp-cards .card .suit-icon { font-size: 15px; }

    .badge {
      position: absolute;
      top: -8px; right: -8px;
      background: #facc15; color: #000;
      border-radius: 10px;
      font-size: 10px; font-weight: 700;
      padding: 2px 6px;
      line-height: 1.4;
    }
    .badge.allin  { background: #f97316; color: #fff; }
    .badge.folded-badge { background: #4b5563; color: #9ca3af; }
    .badge.dealer { background: #facc15; color: #000; }

    /* ── Board area ── */
    .board-area {
      background: #111128;
      border: 1px solid #1e1e3a;
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .board-meta {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .pot-pill {
      background: rgba(250,204,21,0.12);
      border: 1px solid rgba(250,204,21,0.3);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px; font-weight: 700;
      color: #facc15;
    }
    .state-pill {
      background: rgba(167,139,250,0.12);
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px; font-weight: 600;
      color: #a78bfa;
    }
    .state-pill.your-turn {
      background: rgba(74,222,128,0.12);
      border-color: rgba(74,222,128,0.4);
      color: #4ade80;
    }

    .community-cards {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: nowrap;
    }
    .community-cards .card { width: 58px; height: 82px; font-size: 17px; }
    .community-cards .card .suit-icon { font-size: 23px; }

    /* ── My area ── */
    .my-area {
      background: #14142a;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .my-hole-cards {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .my-hole-cards .card { width: 68px; height: 96px; font-size: 20px; }
    .my-hole-cards .card .suit-icon { font-size: 30px; }

    .my-info {
      flex: 1;
      min-width: 100px;
    }
    .my-name {
      font-size: 13px; font-weight: 600; color: #4ade80;
      margin-bottom: 4px;
    }
    .my-chips-line { font-size: 13px; color: #facc15; margin-bottom: 2px; }
    .my-bet-line   { font-size: 12px; color: #a78bfa; }

    .my-badges { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .my-badge {
      font-size: 10px; font-weight: 700;
      border-radius: 8px; padding: 2px 8px;
    }
    .my-badge.dealer-tag { background: #facc15; color: #000; }
    .my-badge.allin-tag  { background: #f97316; color: #fff; }
    .my-badge.folded-tag { background: #374151; color: #9ca3af; }

    /* ── Waiting state ── */
    .waiting-area {
      background: #111128;
      border: 1px solid #1e1e3a;
      border-radius: 16px;
      padding: 40px 20px;
      margin-bottom: 14px;
      text-align: center;
    }
    .waiting-area h3 { font-size: 18px; color: #e0e0e0; margin-bottom: 8px; }
    .waiting-area p { font-size: 14px; color: #5050a0; margin-bottom: 20px; }

    .seat-dots {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .seat-dot {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 2px dashed #2a2a4a;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      transition: all 0.2s;
    }
    .seat-dot.filled {
      background: #1a1a2e;
      border: 2px solid #7c3aed;
    }
    .btn-add-bot {
      background: #1a1a3e;
      border: 1px solid #7c3aed;
      border-radius: 10px;
      color: #a78bfa;
      padding: 10px 24px;
      font-size: 14px; font-weight: 600;
      font-family: 'Segoe UI', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-add-bot:hover { background: #2a1a5e; }

    /* ── Action panel ── */
    .action-panel {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 14px 16px;
    }
    .action-panel.hidden { display: none; }

    .timer-bar-wrap {
      height: 4px;
      background: #2a2a4a;
      border-radius: 2px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .timer-bar {
      height: 100%;
      background: #7c3aed;
      width: 100%;
      transition: width 1s linear, background 0.3s;
    }
    .timer-bar.urgent { background: #ef4444; }

    .bet-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .bet-label { font-size: 13px; color: #7070a0; flex-shrink: 0; }
    .bet-slider {
      flex: 1;
      min-width: 100px;
      accent-color: #7c3aed;
    }
    .bet-input {
      width: 90px;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 7px 10px;
      font-size: 14px;
      font-family: 'Segoe UI', sans-serif;
      text-align: right;
    }
    .bet-input:focus { outline: none; border-color: #7c3aed; }

    .action-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 8px;
    }
    .act-btn {
      padding: 12px 8px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Segoe UI', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .act-btn:hover { opacity: 0.85; }
    .act-btn:disabled { opacity: 0.35; cursor: default; }
    .btn-fold   { background: #4c1d1d; color: #f87171; }
    .btn-check  { background: #1e3a5f; color: #60a5fa; }
    .btn-call   { background: #14532d; color: #4ade80; }
    .btn-raise  { background: #4c1d95; color: #c4b5fd; }
    .btn-allin  { background: #78350f; color: #fbbf24; }

    /* ── Broke / rebuy modal ── */
    .broke-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }
    .broke-modal.show { display: flex; }
    .broke-card {
      background: #1a1a2e;
      border: 1px solid #3a3a6a;
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .broke-card .broke-icon { font-size: 48px; margin-bottom: 10px; }
    .broke-card h2 { font-size: 20px; color: #f87171; font-weight: 700; margin-bottom: 6px; }
    .broke-card .wallet-balance {
      font-size: 13px; color: #7070a0; margin-bottom: 20px;
    }
    .broke-card .wallet-balance strong { color: #facc15; }
    .rebuy-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px; justify-content: center;
    }
    .rebuy-row label { font-size: 13px; color: #a0a0c0; white-space: nowrap; }
    .rebuy-input {
      width: 110px; padding: 8px 10px;
      background: #0f0f1a; border: 1px solid #2a2a4a;
      border-radius: 8px; color: #facc15;
      font-size: 14px; font-weight: 700;
      text-align: center; outline: none;
    }
    .rebuy-input:focus { border-color: #7c3aed; }
    .broke-btns { display: flex; flex-direction: column; gap: 10px; }
    .btn-rebuy {
      padding: 12px; border-radius: 10px;
      background: #7c3aed; color: #fff;
      font-size: 14px; font-weight: 700;
      border: none; cursor: pointer;
    }
    .btn-rebuy:hover { background: #6d28d9; }
    .btn-rebuy:disabled { opacity: 0.5; cursor: default; }
    .btn-leave-broke {
      padding: 12px; border-radius: 10px;
      background: none; color: #7070a0;
      font-size: 14px; font-weight: 600;
      border: 1px solid #2a2a4a; cursor: pointer;
    }
    .btn-leave-broke:hover { border-color: #5050a0; color: #c0c0e0; }
    .rebuy-error { font-size: 12px; color: #f87171; margin-top: -4px; min-height: 16px; }

    /* ── Hand result overlay ── */
    .result-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
      padding: 20px;
    }
    .result-overlay.show { display: flex; }

    .result-card {
      background: #1a1a2e;
      border: 1px solid #3a3a6a;
      border-radius: 20px;
      padding: 22px 24px;
      max-width: 420px;
      width: 100%;
    }
    .result-banner {
      text-align: center;
      margin-bottom: 12px;
    }
    .result-banner h3 { font-size: 22px; color: #facc15; font-weight: 700; margin-bottom: 4px; }
    .result-banner .hand-name { font-size: 14px; color: #a78bfa; }
    .result-banner .pot-label  { font-size: 12px; color: #7070a0; margin-top: 4px; }
    .result-chip-won { font-size: 11px; font-weight: 700; color: #4ade80; margin-left: 6px; }

    .result-community { display: flex; gap: 5px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap; }
    .result-community .card { width: 44px; height: 62px; font-size: 13px; }
    .result-community .card .suit-icon { font-size: 18px; }

    .result-players-list { display: flex; flex-direction: column; gap: 2px; }
    .result-player-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 4px;
      border-top: 1px solid #1e1e3a;
      flex-wrap: wrap;
    }
    .result-player-meta { min-width: 100px; flex: 1; }
    .result-player-name { font-size: 13px; font-weight: 700; display: block; margin-bottom: 2px; }
    .result-player-name.winner  { color: #facc15; }
    .result-player-name.loser   { color: #7070a0; }
    .result-player-handname { font-size: 11px; color: #a78bfa; }
    .result-player-cards { display: flex; gap: 4px; }
    .result-player-cards .card { width: 38px; height: 54px; font-size: 12px; }
    .result-player-cards .card .suit-icon { font-size: 16px; }
    .result-show-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-show-hand {
      background: #1e3a5f; color: #60a5fa;
      border: none; border-radius: 8px;
      padding: 5px 12px; font-size: 11px; font-weight: 700;
      font-family: 'Segoe UI', sans-serif; cursor: pointer;
    }
    .btn-muck {
      background: transparent; color: #5050a0;
      border: 1px solid #2a2a4a; border-radius: 8px;
      padding: 5px 12px; font-size: 11px; font-weight: 700;
      font-family: 'Segoe UI', sans-serif; cursor: pointer;
    }
    .result-card .next-msg { font-size: 12px; color: #5050a0; text-align: center; margin-top: 14px; }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      border: 1px solid #ddd;
      user-select: none;
      position: relative;
      flex-shrink: 0;
      gap: 1px;
    }
    .card.back {
      background: linear-gradient(135deg, #1e1480 0%, #3730a3 100%);
      border-color: #4338ca;
    }
    .card.hearts, .card.diamonds { color: #dc2626; }
    .card.spades,  .card.clubs   { color: #111; }
    .card.placeholder {
      background: rgba(255,255,255,0.04);
      border: 2px dashed #2a3a2a;
    }
    .card .suit-icon { line-height: 1; }

    /* ── Hand history ── */
    .history-section {
      margin-top: 20px;
    }
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      padding: 10px 14px;
      background: #111128;
      border: 1px solid #1e1e3a;
      border-radius: 12px;
      user-select: none;
    }
    .history-header span { font-size: 13px; font-weight: 600; color: #7070a0; }
    .history-header .toggle-icon { font-size: 12px; color: #5050a0; transition: transform 0.2s; }
    .history-header.open .toggle-icon { transform: rotate(180deg); }

    .history-list {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 6px;
    }
    .history-list.visible { display: flex; }

    .history-entry {
      background: #111128;
      border: 1px solid #1e1e3a;
      border-radius: 12px;
      padding: 12px 14px;
    }
    .history-entry-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 4px;
    }
    .history-hand-num { font-size: 11px; color: #5050a0; }
    .history-winner {
      font-size: 12px; font-weight: 600;
      color: #facc15;
    }
    .history-hand-name { font-size: 11px; color: #a78bfa; }

    .history-community { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
    .history-community .card { width: 36px; height: 50px; font-size: 11px; }
    .history-community .card .suit-icon { font-size: 14px; }

    .history-players { display: flex; flex-direction: column; gap: 0; }
    .history-player-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-top: 1px solid #181830;
      flex-wrap: wrap;
    }
    .history-player-name {
      font-size: 11px; color: #6060a0; font-weight: 600;
      min-width: 80px;
    }
    .history-player-name.winner-name { color: #facc15; }
    .history-player-name.loser-name  { color: #5050a0; }
    .history-player-cards { display: flex; gap: 3px; }
    .history-player-cards .card { width: 28px; height: 40px; font-size: 10px; }
    .history-player-cards .card .suit-icon { font-size: 12px; }
    .history-player-handname { font-size: 10px; color: #6060a0; }
    .history-outcome {
      font-size: 10px; font-weight: 700;
      border-radius: 6px; padding: 2px 7px;
    }
    .history-outcome.won    { background: rgba(250,204,21,0.15);  color: #facc15; }
    .history-outcome.lost   { background: rgba(239,68,68,0.1);    color: #f87171; }
    .history-outcome.mucked { background: rgba(80,80,160,0.1);    color: #5050a0; }
    .history-outcome.folded { background: rgba(100,100,140,0.12); color: #7070a0; }

    @media (max-width: 500px) {
      .community-cards .card { width: 46px; height: 66px; font-size: 14px; }
      .community-cards .card .suit-icon { font-size: 19px; }
      .my-hole-cards .card { width: 56px; height: 80px; font-size: 17px; }
      .my-hole-cards .card .suit-icon { font-size: 24px; }
      .opp-pod { min-width: 80px; padding: 8px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="../../index.html" class="nav-logo" style="text-decoration:none;">🎮 PlayDen</a>
    <ul class="nav-links"></ul>
    <div class="nav-auth" id="navAuth"></div>
  </nav>

  <div class="game-wrap">
    <div class="top-bar">
      <h2 id="tableTitle">♠️ Poker</h2>
      <div class="top-bar-right">
        <div class="chips-badge" id="chipsBadge" style="display:none;">🪙 <strong id="chipsDisplay">0</strong></div>
        <button class="btn-leave" onclick="leaveTable()">Leave Table</button>
      </div>
    </div>

    <div id="statusBox">
      <div style="text-align:center;padding:60px;color:#5050a0;">Connecting to table…</div>
    </div>

    <!-- Hand history (always visible, populated after each hand) -->
    <div class="history-section" id="historySection" style="display:none;">
      <div class="history-header" id="historyHeader" onclick="toggleHistory()">
        <span>🃏 Hand History (<span id="historyCount">0</span>)</span>
        <span class="toggle-icon">▼</span>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <!-- Hand result overlay (outside game-wrap so it covers full screen) -->
  <div class="result-overlay" id="resultOverlay"></div>

  <!-- Out of chips / rebuy modal -->
  <div class="broke-modal" id="brokeModal">
    <div class="broke-card">
      <div class="broke-icon">😬</div>
      <h2>You're out of chips!</h2>
      <div class="wallet-balance" id="brokeWalletLine">Checking wallet…</div>
      <div class="rebuy-row" id="rebuySelectorRow" style="display:none;">
        <label>Buy in:</label>
        <input class="rebuy-input" id="rebuyAmount" type="number" min="1000" step="500" value="1000" />
        <span style="font-size:12px;color:#7070a0;">chips</span>
      </div>
      <div class="rebuy-error" id="rebuyError"></div>
      <div class="broke-btns">
        <button class="btn-rebuy" id="btnRebuy" style="display:none;" onclick="rebuySeat()">
          Sit Back In
        </button>
        <button class="btn-leave-broke" onclick="leaveBroke()">Leave Table</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut }
      from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, doc, getDoc, updateDoc }
      from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyDT810ckpGIr0ExRp3S_bAO_NBnSGr5ALY",
      authDomain:        "gamezone-6487a.firebaseapp.com",
      projectId:         "gamezone-6487a",
      storageBucket:     "gamezone-6487a.firebasestorage.app",
      messagingSenderId: "266519256159",
      appId:             "1:266519256159:web:34d6be085083cda5ff4fea"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const SERVER_URL = 'https://gamezone-poker.onrender.com';

    const params  = new URLSearchParams(window.location.search);
    const tableId = params.get('table');

    let socket        = null;
    let myUserId      = null;
    let timerInterval = null;
    let timerSecs     = 30;
    let lastHandNumber = 0;
    const handHistory  = [];   // stores last 10 hand results

    const navAuth = document.getElementById('navAuth');

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = '../../login.html'; return; }
      myUserId = user.uid;

      const name = user.displayName || user.email.split('@')[0];
      navAuth.innerHTML = `
        <a href="../../account.html" class="nav-username" style="text-decoration:none;">👾 ${escHtml(name)}</a>
        <button class="btn-secondary" id="logoutBtn">Log out</button>
      `;
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        if (socket) socket.disconnect();
        await signOut(auth);
        window.location.href = '../../index.html';
      });

      await loadSocketIO(user);
    });

    async function loadSocketIO(user) {
      const script = document.createElement('script');
      script.src = `${SERVER_URL}/socket.io/socket.io.js`;
      script.onload = () => connectSocket(user);
      script.onerror = () => {
        document.getElementById('statusBox').innerHTML =
          `<div style="text-align:center;padding:60px;color:#f87171;">
            ⚠️ Cannot reach poker server.<br>
            <a href="lobby.html" style="color:#a78bfa;">Back to lobby</a>
          </div>`;
      };
      document.head.appendChild(script);
    }

    async function connectSocket(user) {
      socket = io(SERVER_URL, { transports: ['websocket'] });

      socket.on('connect', async () => {
        const idToken = await user.getIdToken();
        socket.emit('auth', {
          idToken,
          userId:   user.uid,
          username: user.displayName || user.email.split('@')[0]
        });
      });

      socket.on('authed', () => {
        if (tableId) socket.emit('joinTable', { tableId, inviteCode: null });
      });

      socket.on('tableState', (state) => {
        renderTable(state);
      });

      socket.on('handResult', (result) => {
        showHandResult(result);
      });

      socket.on('brokeOut', async () => {
        // Wait for hand result overlay to finish, then show rebuy modal
        setTimeout(async () => {
          document.getElementById('resultOverlay')?.classList.remove('show');
          const modal       = document.getElementById('brokeModal');
          const walletLine  = document.getElementById('brokeWalletLine');
          const selectorRow = document.getElementById('rebuySelectorRow');
          const rebuyBtn    = document.getElementById('btnRebuy');
          const amtInput    = document.getElementById('rebuyAmount');
          if (!modal) return;

          // Load current wallet balance from Firestore
          try {
            const user = auth.currentUser;
            if (user) {
              const snap = await getDoc(doc(db, 'users', user.uid));
              const walletChips = snap.exists() ? (snap.data().chips || 0) : 0;

              if (walletChips >= 1000) {
                walletLine.innerHTML = `Wallet: <strong>${walletChips.toLocaleString()} 🪙</strong> — choose a buy-in to stay:`;
                amtInput.max   = walletChips;
                amtInput.value = Math.min(1000, walletChips);
                selectorRow.style.display = '';
                rebuyBtn.style.display    = '';
              } else {
                walletLine.innerHTML = `Wallet: <strong>${walletChips.toLocaleString()} 🪙</strong> — not enough chips to rebuy (min 1,000).`;
                selectorRow.style.display = 'none';
                rebuyBtn.style.display    = 'none';
              }
            }
          } catch (err) {
            walletLine.textContent = 'Could not load wallet.';
          }

          modal.classList.add('show');
        }, 6000);
      });

      socket.on('error', (msg) => {
        if (msg === 'Table not found') {
          window.location.href = 'lobby.html';
        } else {
          alert('Error: ' + msg);
        }
      });

      socket.on('disconnect', () => {
        document.getElementById('statusBox').innerHTML =
          `<div style="text-align:center;padding:40px;color:#f87171;">Disconnected. <a href="lobby.html" style="color:#a78bfa;">Back to lobby</a></div>`;
      });
    }

    // ── Render table state ──────────────────────────────────────
    function renderTable(state) {
      const me = state.players.find(p => p.userId === myUserId);

      // Update chips badge in top bar
      if (me) {
        document.getElementById('chipsDisplay').textContent = me.chips.toLocaleString();
        document.getElementById('chipsBadge').style.display = '';
      }

      // Update table title with blinds + hand number
      const stakeLabels = { low: '25/50', mid: '100/200', high: '500/1000' };
      document.getElementById('tableTitle').textContent =
        `♠️ Poker  ·  ${stakeLabels[state.stakeLevel] || ''}  ·  Hand #${state.handNumber}`;
      lastHandNumber = state.handNumber;

      const sb = document.getElementById('statusBox');
      if (state.state === 'waiting') {
        sb.innerHTML = buildWaiting(state);
        return;
      }
      sb.innerHTML = buildGameUI(state, me);
      setupActions(state, me);
    }

    // ── Waiting screen ──────────────────────────────────────────
    function buildWaiting(state) {
      const seated  = state.players.filter(p => p.sitting).length;
      const hasBot  = state.players.some(p => p.userId && p.userId.startsWith('bot_'));
      const iAlone  = seated === 1 && state.players.some(p => p.userId === myUserId);
      const showBtn = iAlone && !hasBot;

      let dots = '';
      for (let i = 0; i < 5; i++) {
        dots += `<div class="seat-dot ${i < seated ? 'filled' : ''}">
          ${i < seated ? '👤' : ''}
        </div>`;
      }

      return `
        <div class="waiting-area">
          <h3>Waiting for players</h3>
          <p>${seated} of 5 seated · Game starts when 2+ players join</p>
          <div class="seat-dots">${dots}</div>
          ${showBtn ? `<button class="btn-add-bot" onclick="addBot()">🤖 Play vs Bot</button>` : ''}
        </div>
        <div class="action-panel hidden" id="actionPanel"></div>
      `;
    }

    // ── Game UI ─────────────────────────────────────────────────
    function buildGameUI(state, me) {
      const isMyTurn   = me && state.players[state.actionIdx]?.userId === myUserId;
      const stateLabel = { preflop:'Pre-flop', flop:'Flop', turn:'Turn', river:'River', showdown:'Showdown', starting:'Starting…' };

      // Opponents = everyone except me
      const opponents = state.players.filter(p => p.userId !== myUserId);

      let opponentsHtml = '';
      if (opponents.length === 0) {
        opponentsHtml = `<div style="color:#3a3a6a;font-size:13px;padding:20px;">No opponents yet</div>`;
      } else {
        opponentsHtml = opponents.map(p => buildOpponentPod(p, state)).join('');
      }

      return `
        <!-- Opponents -->
        <div class="opponents-row">${opponentsHtml}</div>

        <!-- Board: community cards + pot -->
        <div class="board-area">
          <div class="board-meta">
            <div class="pot-pill">💰 Pot: ${state.pot.toLocaleString()}</div>
            <div class="state-pill ${isMyTurn ? 'your-turn' : ''}">
              ${stateLabel[state.state] || state.state}${isMyTurn ? ' — Your turn!' : ''}
            </div>
          </div>
          <div class="community-cards">
            ${buildCommunityCards(state.community)}
          </div>
        </div>

        <!-- My area -->
        ${me ? buildMyArea(me, state) : ''}

        <!-- Action panel -->
        ${buildActionPanel(state, me)}
      `;
    }

    function buildOpponentPod(p, state) {
      const isActive  = state.players[state.actionIdx]?.userId === p.userId;
      const isDealer  = state.players.indexOf(state.players.find(pl => pl.userId === p.userId)) === state.dealerIdx;
      const classes   = ['opp-pod', isActive ? 'active' : '', p.folded ? 'folded' : ''].filter(Boolean).join(' ');

      let badge = '';
      if (isDealer && !p.folded && !p.allIn) badge = `<div class="badge dealer">D</div>`;
      if (p.allIn)  badge = `<div class="badge allin">ALL-IN</div>`;
      if (p.folded) badge = `<div class="badge folded-badge">FOLD</div>`;

      return `
        <div class="${classes}">
          ${badge}
          <div class="opp-avatar">${p.userId.startsWith('bot_') ? '🤖' : '👤'}</div>
          <div class="opp-name">${escHtml(p.username)}</div>
          <div class="opp-chips">🪙 ${p.chips.toLocaleString()}</div>
          ${p.bet > 0 ? `<div class="opp-bet">Bet: ${p.bet.toLocaleString()}</div>` : ''}
          <div class="opp-cards">${p.cards.map(c => buildCard(c, 'opp')).join('')}</div>
        </div>`;
    }

    function buildMyArea(me, state) {
      const isDealer = state.players.indexOf(state.players.find(p => p.userId === me.userId)) === state.dealerIdx;
      let badges = '';
      if (isDealer) badges += `<span class="my-badge dealer-tag">Dealer</span>`;
      if (me.allIn)  badges += `<span class="my-badge allin-tag">ALL-IN</span>`;
      if (me.folded) badges += `<span class="my-badge folded-tag">Folded</span>`;

      return `
        <div class="my-area">
          <div class="my-hole-cards">
            ${me.cards.map(c => buildCard(c, 'mine')).join('')}
          </div>
          <div class="my-info">
            <div class="my-name">You</div>
            <div class="my-chips-line">🪙 ${me.chips.toLocaleString()}</div>
            ${me.bet > 0 ? `<div class="my-bet-line">Bet: ${me.bet.toLocaleString()}</div>` : ''}
            ${badges ? `<div class="my-badges">${badges}</div>` : ''}
          </div>
        </div>`;
    }

    function buildCommunityCards(cards) {
      let html = '';
      for (let i = 0; i < 5; i++) {
        html += i < cards.length ? buildCard(cards[i], 'community') : `<div class="card placeholder"></div>`;
      }
      return html;
    }

    function buildActionPanel(state, me) {
      if (!state || !me) return `<div class="action-panel hidden" id="actionPanel"></div>`;
      const isMyTurn = state.players[state.actionIdx]?.userId === myUserId;
      if (!isMyTurn || me.folded || me.allIn || state.state === 'showdown' || state.state === 'waiting') {
        return `<div class="action-panel hidden" id="actionPanel"></div>`;
      }
      const canCheck = me.bet >= state.currentBet;
      const toCall   = state.currentBet - me.bet;
      const minRaise = state.currentBet + (state.stakeLevel === 'low' ? 50 : state.stakeLevel === 'mid' ? 200 : 1000);
      const maxBet   = me.chips + me.bet;

      return `
        <div class="action-panel" id="actionPanel">
          <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar"></div></div>
          <div class="bet-row">
            <span class="bet-label">Raise to:</span>
            <input type="range" class="bet-slider" id="betSlider"
              min="${minRaise}" max="${maxBet}" step="50"
              value="${minRaise}" oninput="syncBet(this.value)"/>
            <input type="number" class="bet-input" id="betInput"
              min="${minRaise}" max="${maxBet}"
              value="${minRaise}" oninput="syncSlider(this.value)"/>
          </div>
          <div class="action-buttons">
            <button class="act-btn btn-fold"  onclick="sendAction('fold')">Fold</button>
            <button class="act-btn btn-check" onclick="sendAction('check')" ${canCheck ? '' : 'disabled'}>Check</button>
            <button class="act-btn btn-call"  onclick="sendAction('call')"  ${toCall <= 0 ? 'disabled' : ''}>
              Call${toCall > 0 ? ' ' + toCall.toLocaleString() : ''}
            </button>
            <button class="act-btn btn-raise" onclick="sendAction('raise')">Raise</button>
            <button class="act-btn btn-allin" onclick="sendAction('allin')">All-in</button>
          </div>
        </div>`;
    }

    function setupActions(state, me) {
      if (!me) return;
      const isMyTurn = state.players[state.actionIdx]?.userId === myUserId;
      if (!isMyTurn) return;

      clearInterval(timerInterval);
      timerSecs = 30;
      const bar = document.getElementById('timerBar');
      if (bar) {
        timerInterval = setInterval(() => {
          timerSecs--;
          if (bar) {
            bar.style.width = `${(timerSecs / 30) * 100}%`;
            if (timerSecs <= 8) bar.classList.add('urgent');
          }
          if (timerSecs <= 0) clearInterval(timerInterval);
        }, 1000);
      }
    }

    // ── Hand result overlay ─────────────────────────────────────
    // shownSet: maps userId → true (show) | false (muck)
    // Rules: winners always show; bots always show; human loser gets to choose
    let _currentResult = null;

    function showHandResult(result) {
      const overlay = document.getElementById('resultOverlay');
      if (!overlay) return;

      const winners    = result.winners    || [];
      const allPlayers = result.allPlayers || winners;
      const community  = result.community  || [];
      const isSplit    = result.isSplit    || winners.length > 1;
      const pot        = result.pot        || 0;
      const names      = winners.map(w => escHtml(w.username)).join(' & ') || 'Unknown';
      const winnerHandName = winners[0]?.handName || '';

      // Build initial shown set: auto-show winners + bots; human losers decide
      const shownSet = {};
      for (const p of allPlayers) {
        shownSet[p.userId] = p.isWinner || p.userId.startsWith('bot_');
      }

      const foldedPlayers = result.foldedPlayers || [];
      _currentResult = { handNumber: lastHandNumber, winners, allPlayers, foldedPlayers, community, shownSet, isSplit, pot };

      function renderOverlay() {
        const communityHtml = community.map(c => buildCard(c, 'result')).join('');
        const playersHtml   = allPlayers.map(p => {
          const shown    = shownSet[p.userId];
          const isMe     = p.userId === myUserId;
          const isBot    = p.userId.startsWith('bot_');
          const cardsHtml = shown
            ? (p.cards || []).map(c => buildCard(c, 'result')).join('')
            : (p.cards || []).map(() => `<div class="card back"></div>`).join('');

          let choiceBtns = '';
          if (isMe && !p.isWinner && shownSet[p.userId] === false) {
            // Human loser: offer Show/Muck choice
            choiceBtns = `
              <div class="result-show-btns">
                <button class="btn-show-hand" onclick="_revealHand('${p.userId}')">Show Hand</button>
                <button class="btn-muck" onclick="_muckHand('${p.userId}')">Muck</button>
              </div>`;
          }

          const chipLabel = p.isWinner && p.won
            ? `<span class="result-chip-won">+${p.won.toLocaleString()} 🪙</span>`
            : '';

          return `
            <div class="result-player-row">
              <div class="result-player-meta">
                <span class="result-player-name ${p.isWinner ? 'winner' : 'loser'}">
                  ${p.isWinner ? (isSplit ? '🤝 ' : '🏆 ') : ''}${escHtml(p.username)}
                </span>
                ${shown ? `<span class="result-player-handname">${escHtml(p.handName || '')}</span>` : ''}
                ${chipLabel}
              </div>
              <div class="result-player-cards">${cardsHtml}</div>
              ${choiceBtns}
            </div>`;
        }).join('');

        const bannerIcon = isSplit ? '🤝' : '🏆';
        const bannerVerb = isSplit ? 'Split Pot' : 'wins!';
        const potLabel   = pot ? `<div class="pot-label">Pot: ${pot.toLocaleString()} 🪙</div>` : '';

        overlay.innerHTML = `
          <div class="result-card">
            <div class="result-banner">
              <h3>${bannerIcon} ${names} ${bannerVerb}</h3>
              ${winnerHandName ? `<div class="hand-name">${escHtml(winnerHandName)}</div>` : ''}
              ${potLabel}
            </div>
            ${communityHtml ? `<div class="result-community">${communityHtml}</div>` : ''}
            <div class="result-players-list">${playersHtml}</div>
            <div class="next-msg">Next hand starting soon…</div>
          </div>`;
      }

      renderOverlay();
      overlay.classList.add('show');

      // Expose choice handlers to onclick
      window._revealHand = (uid) => {
        shownSet[uid] = true;
        renderOverlay();
        // Update history entry to reflect the reveal
        if (_currentResult) refreshHistory();
      };
      window._muckHand = (uid) => {
        // shownSet[uid] stays false — cards stay hidden (already rendered as backs)
        // Remove the choice buttons by marking as "decided"
        shownSet[uid] = 'mucked';
        renderOverlay();
        if (_currentResult) refreshHistory();
      };

      // Auto-dismiss after 6 seconds
      setTimeout(() => overlay.classList.remove('show'), 6000);

      // Add to history once the overlay is shown (final state captured on dismiss)
      addToHistory(_currentResult);
    }

    // ── Hand history ────────────────────────────────────────────
    function addToHistory(entry) {
      handHistory.unshift(entry);
      if (handHistory.length > 10) handHistory.pop();
      refreshHistory();
    }

    function refreshHistory() {
      const section = document.getElementById('historySection');
      const countEl = document.getElementById('historyCount');
      const list    = document.getElementById('historyList');
      if (!section || !list) return;

      section.style.display = '';
      countEl.textContent = handHistory.length;

      list.innerHTML = handHistory.map(h => {
        const isSplit       = h.isSplit || (h.winners || []).length > 1;
        const winnerNames   = (h.winners || []).map(w => escHtml(w.username)).join(' & ') || '?';
        const winnerHandName = (h.winners || [])[0]?.handName || 'Last standing';
        const communityHtml = (h.community || []).map(c => buildCard(c, 'history')).join('');
        const potLabel      = h.pot ? `· 🪙 ${h.pot.toLocaleString()}` : '';

        const playersHtml = (h.allPlayers || []).map(p => {
          const shown     = h.shownSet ? h.shownSet[p.userId] : p.isWinner;
          const showCards = shown === true;
          const mucked    = shown === 'mucked' || shown === false;
          const isMe      = p.userId === myUserId;

          const cardsHtml = showCards
            ? (p.cards || []).map(c => buildCard(c, 'history')).join('')
            : (p.cards || []).map(() => `<div class="card back"></div>`).join('');

          let outcomeTag;
          if (p.isWinner) {
            const wonLabel = p.won ? ` +${p.won.toLocaleString()}` : '';
            const pill     = isSplit ? 'Split' : 'Won';
            outcomeTag = `<span class="history-outcome won">${pill}${wonLabel} 🪙</span>`;
          } else if (mucked && isMe) {
            outcomeTag = `<span class="history-outcome mucked">Mucked</span>`;
          } else {
            outcomeTag = `<span class="history-outcome lost">Lost</span>`;
          }

          return `
            <div class="history-player-row">
              <span class="history-player-name ${p.isWinner ? 'winner-name' : 'loser-name'}">
                ${escHtml(p.username)}
              </span>
              <div class="history-player-cards">${cardsHtml}</div>
              ${showCards ? `<span class="history-player-handname">${escHtml(p.handName || '')}</span>` : ''}
              ${outcomeTag}
            </div>`;
        }).join('');

        const foldedHtml = (h.foldedPlayers || []).map(p => `
            <div class="history-player-row">
              <span class="history-player-name loser-name">${escHtml(p.username)}</span>
              <div class="history-player-cards">
                ${(p.cards || []).map(() => `<div class="card back"></div>`).join('')}
              </div>
              <span class="history-player-handname"></span>
              <span class="history-outcome folded">Folded</span>
            </div>`).join('');

        const headerIcon = isSplit ? '🤝' : '🏆';
        return `
          <div class="history-entry">
            <div class="history-entry-top">
              <span class="history-hand-num">Hand #${h.handNumber}</span>
              <span class="history-winner">${headerIcon} ${winnerNames} · ${escHtml(winnerHandName)} ${potLabel}</span>
            </div>
            <div class="history-community">${communityHtml}</div>
            <div class="history-players">${playersHtml}${foldedHtml}</div>
          </div>`;
      }).join('');
    }

    window.toggleHistory = () => {
      const header = document.getElementById('historyHeader');
      const list   = document.getElementById('historyList');
      if (!header || !list) return;
      const open = list.classList.toggle('visible');
      header.classList.toggle('open', open);
    };

    // ── Rebuy / leave modal handlers ────────────────────────────
    window.rebuySeat = () => {
      const amtInput = document.getElementById('rebuyAmount');
      const errorEl  = document.getElementById('rebuyError');
      const btn      = document.getElementById('btnRebuy');
      errorEl.textContent = '';

      let buyIn = Math.round((parseInt(amtInput?.value) || 1000) / 500) * 500;
      buyIn = Math.max(1000, buyIn);

      if (!tableId) { errorEl.textContent = 'Table ID missing — cannot rejoin.'; return; }

      btn.disabled    = true;
      btn.textContent = 'Rejoining…';

      // Rejoin via the existing joinTable event — server treats this as a fresh buy-in
      socket.emit('joinTable', { tableId, inviteCode: null, buyIn });

      // Listen for confirmation or error (one-time)
      const onJoined = () => {
        document.getElementById('brokeModal')?.classList.remove('show');
        socket.off('error', onErr);
      };
      const onErr = (msg) => {
        errorEl.textContent = msg;
        btn.disabled    = false;
        btn.textContent = 'Sit Back In';
        socket.off('joinedTable', onJoined);
      };
      socket.once('joinedTable', onJoined);
      socket.once('error', onErr);
    };

    window.leaveBroke = () => {
      window.location.href = 'lobby.html';
    };

    // ── Card builder ────────────────────────────────────────────
    const SUIT_SYMBOLS = { s: '♠', h: '♥', d: '♦', c: '♣' };
    const SUIT_CLASSES  = { s: 'spades', h: 'hearts', d: 'diamonds', c: 'clubs' };
    const RANK_DISPLAY  = { T: '10', J: 'J', Q: 'Q', K: 'K', A: 'A' };

    // sizeCtx: 'opp' | 'mine' | 'community' | 'result'
    function buildCard(card, sizeCtx) {
      if (!card || card.rank === '?') {
        return `<div class="card back"></div>`;
      }
      const suitClass = SUIT_CLASSES[card.suit] || '';
      const rankStr   = RANK_DISPLAY[card.rank] || card.rank;
      const suitSym   = SUIT_SYMBOLS[card.suit] || card.suit;
      return `
        <div class="card ${suitClass}">
          <span style="font-size:0.75em;line-height:1;">${rankStr}</span>
          <span class="suit-icon">${suitSym}</span>
        </div>`;
    }

    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Exposed to non-module onclick handlers ──────────────────
    window.sendAction = (action) => {
      if (!socket) return;
      let amount = 0;
      if (action === 'raise') {
        amount = parseInt(document.getElementById('betInput')?.value || 0);
      }
      socket.emit('playerAction', { action, amount });
      clearInterval(timerInterval);
    };

    window.addBot = () => {
      if (socket) socket.emit('addBot');
    };

    window.leaveTable = () => {
      if (socket) socket.emit('leaveTable');
      window.location.href = 'lobby.html';
    };

    window.syncBet = (val) => {
      const input = document.getElementById('betInput');
      if (input) input.value = val;
    };
    window.syncSlider = (val) => {
      const slider = document.getElementById('betSlider');
      if (slider) slider.value = val;
    };
  </script>

</body>
</html>
